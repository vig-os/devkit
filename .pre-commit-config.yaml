---
# .pre-commit-config.yaml

exclude: ^.github_data/|^docs/issues/|^docs/pull-requests/

# Build python-language hooks with the project interpreter (3.14) so PEP 758
# syntax (bare except tuples) never false-flags under an older parser. Refs #803.
default_language_version:
  python: python3.14

repos:
  # General Pre-commit Hooks (Fixes formatting issues)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b  # v5.0.0
    hooks:
      # Enforce topic branch naming:
      # - chore/<short_summary> (no issue required)
      # - <type>/<issue_number>-<short_summary> (for feature, bugfix, etc.)
      # - worktree/<issue_number> (autonomous worktree branches)
      # Allows main, dev, and branches matching the convention.
      - id: no-commit-to-branch
        name: branch-name (enforce <type>/<issue>-<summary>)
        args:
          - --branch
          - __none__  # override default so main/dev are not protected
          - --pattern
          - "^(?!main$)(?!dev$)(?!^(chore)/[a-z0-9]+(-[a-z0-9]+)*$)(?!^(feature|bugfix|hotfix|release|docs|test|refactor)/[0-9]+-[a-z0-9]+(-[a-z0-9]+)*$)(?!^worktree/[0-9]+$).+$"
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
        # git-hooks.nix' check-yaml built-in hardcodes --multi, so match it here
        # to keep the runner and the checks.pre-commit gate in agreement (#778).
        args: [--allow-multiple-documents]
      - id: debug-statements
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  # Python Linting and Formatting (Ruff, sourced from the flake dev-shell)
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint/fix python)
        entry: ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format (format python)
        entry: ruff format
        language: system
        types: [python]

  # YAML Linting
  - repo: https://github.com/adrienverge/yamllint
    rev: 81e9f98ffd059efe8aa9c1b1a42e5cce61b640c6  # v1.35.1
    hooks:
      - id: yamllint
        args: ["--format", "parsable", "--strict"]

  # TOML Linting (style + semantic checks)
  - repo: local
    hooks:
      - id: taplo-format
        name: taplo-format
        entry: taplo format --config .taplo.toml
        language: system
        types: [toml]
      - id: taplo-lint
        name: taplo-lint
        entry: taplo lint --config .taplo.toml
        language: system
        types: [toml]

  # Shellcheck (sourced from the flake dev-shell toolchain). The
  # shellcheck-py wheel bundles a manylinux shellcheck binary that the Nix
  # image's non-FHS userland cannot exec, and the prek/uv installer cannot
  # build that wheel under Python 3.14 — so, like ruff/typos/nixfmt (#697,
  # #701), shellcheck runs as a language:system hook resolved from the flake
  # (devTools ships `shellcheck`). Refs #778.
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        # .envrc files (root + the scaffolded template stub) are direnv stdlib
        # scripts with no shebang; exclude them from SC2148 at any path.
        args: ["-x"]
        exclude: (^|/)\.envrc$

  # GitHub Actions workflow linting (actionlint from the flake dev-shell). Lints
  # THIS repo's own .github/workflows/ via auto-discovery; actionlint's bundled
  # shellcheck pass over run-block scripts is enabled (#1003, the standalone
  # shellcheck hook above still covers .sh scripts). Devkit-only: not scaffolded
  # to consumers — the per-mode rendered templates are validated in tests/bats.
  # Refs #995.
  - repo: local
    hooks:
      - id: actionlint
        name: actionlint (lint GitHub Actions workflows)
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false

  # Markdown Linting (excludes auto-generated docs)
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: f93643d339dfee2a1022e7b05e8b5a281bfac553  # v0.9.23
    hooks:
      - id: pymarkdown
        name: pymarkdown
        args: ["-c", ".pymarkdown", "fix"]
        exclude: ^(README\.md|CONTRIBUTE\.md|TESTING\.md)

  # Justfile formatting
  - repo: local
    hooks:
      - id: just-fmt
        name: just (format justfiles)
        entry: just --fmt --unstable
        language: system
        files: ^justfile(\..*)?$
        pass_filenames: false

  # Nix formatting (nixfmt-rfc-style from the flake dev-shell toolchain)
  - repo: local
    hooks:
      - id: nixfmt
        name: nixfmt (format/check nix files)
        entry: nixfmt --check
        language: system
        files: \.nix$
        types: [file]

  # Documentation Generation (auto-regenerate on template/requirements changes)
  - repo: local
    hooks:
      - id: generate-docs
        name: generate-docs (regenerate from templates)
        entry: uv run python docs/generate.py
        language: system
        files: ^(docs/templates/.*\.j2|docs/narrative/.*\.md|scripts/requirements\.yaml|justfile|CHANGELOG\.md|\.claude/skills/.*/SKILL\.md)$
        pass_filenames: false

  # Workspace sync (keep assets/workspace in sync with manifest)
  - repo: local
    hooks:
      - id: sync-manifest
        name: sync-manifest
        entry: uv run python scripts/sync_manifest.py sync assets/workspace/
        language: system
        pass_filenames: false

  # Typo Linting (typos sourced from the flake dev-shell)
  - repo: local
    hooks:
      - id: typos
        name: typos (source typo checker)
        entry: typos --force-exclude
        language: system

  # License Compliance Check (runs only when dependencies change)
  - repo: local
    hooks:
      - id: pip-licenses
        name: pip-licenses (check dependency licenses)
        entry: uv run pip-licenses --fail-on="GPL-3.0-only;GPL-3.0-or-later;AGPL-3.0-only;AGPL-3.0-or-later"
        language: system
        files: ^(pyproject\.toml|uv\.lock|requirements.*\.txt)$
        pass_filenames: false

  # GitHub Actions SHA pinning enforcement
  - repo: local
    hooks:
      - id: check-action-pins
        name: check-action-pins (verify SHA-pinned actions)
        entry: uv run check-action-pins
        language: system
        files: ^\.github/(workflows/.*\.ya?ml|actions/.*/action\.ya?ml)$
        pass_filenames: false

  # Python Security (Bandit)
  - repo: local
    hooks:
      - id: bandit
        name: bandit (Python security linting)
        entry: uv run bandit -r packages/vig-utils/src/ assets/workspace/ -ll
        language: system
        types: [python]
        pass_filenames: false

  # Skill directory naming convention
  - repo: local
    hooks:
      - id: check-skill-names
        name: check-skill-names (enforce naming convention)
        entry: uv run check-skill-names .claude/skills
        language: system
        files: ^\.claude/skills/
        pass_filenames: false

  # Security exception expiry enforcement (Refs: #566)
  - repo: local
    hooks:
      - id: check-expirations
        name: check-expirations (.trivyignore/.vulnixignore expiry enforcement)
        entry: uv run check-expirations .trivyignore .vulnixignore
        language: system
        files: ^\.(trivyignore|vulnixignore)$
        pass_filenames: false

  # AI agent identity: strip trailers before commit-msg (Refs: #163)
  - repo: local
    hooks:
      - id: prepare-commit-msg-strip-trailers
        name: strip agent trailers from commit message
        entry: uv run prepare-commit-msg-strip-trailers
        language: system
        stages: [prepare-commit-msg]
        pass_filenames: true

  # AI agent identity: reject author/committer matching blocklist (Refs: #163)
  - repo: local
    hooks:
      - id: check-agent-identity
        name: check agent identity
        entry: uv run check-agent-identity
        language: system
        pass_filenames: false

  # Commit message validation (commit-msg stage)
  - repo: local
    hooks:
      - id: validate-commit-msg
        name: validate commit message
        entry: uv run validate-commit-msg
        language: system
        stages: [commit-msg]
        args: [
          "--types", "feat,fix,docs,chore,refactor,test,ci,build,revert,style",
          "--scopes", "agent,ci,setup,image,vigutils",
          "--refs-optional-types", "chore",
          "--blocked-patterns", ".github/agent-blocklist.toml",
        ]
