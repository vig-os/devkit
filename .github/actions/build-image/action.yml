# Composite action to build the Nix-built devcontainer image to a tar.
#
# Builds `packages.devcontainerImage` (flake `dockerTools.buildLayeredImage`)
# natively for the runner's architecture and writes a gzipped OCI tar. Nix is
# the only build path (the Debian Containerfile was decommissioned in #642).
#
# Inputs:
#   version: Semantic version (e.g., 1.0.0, dev-abc123) — used for the image tag
#   arch: Target architecture (amd64, arm64) — used for the image tag
#   release-date / release-url / build-timestamp / vcs-ref: release metadata
#     (kept for caller compatibility; the Nix image stamps its own static,
#     reproducible OCI labels in flake.nix, so these are not baked into it)
#   registry: Container registry URL (default: ghcr.io/vig-os/devcontainer)
#   output-file: Path for the tar output
#   cachix-cache / cachix-auth-token: passed to flake provisioning (setup-env)
#
# Outputs:
#   image-tag: Full image tag (e.g., ghcr.io/vig-os/devcontainer:1.0.0-amd64)
#   tar-file: Path to the saved tar file

name: 'Build Container Image'
description: 'Build the Nix-built devcontainer image (flake devcontainerImage) for an architecture'

inputs:
  version:
    description: 'Semantic version (e.g., 1.0.0, dev-abc123)'
    required: true
  arch:
    description: 'Target architecture (amd64, arm64)'
    required: true
  release-date:
    description: 'Release date in YYYY-MM-DD format (release metadata)'
    required: false
    default: ''
  release-url:
    description: 'URL to release page (release metadata)'
    required: false
    default: ''
  build-timestamp:
    description: 'Build timestamp in ISO 8601 format (release metadata)'
    required: false
    default: ''
  vcs-ref:
    description: 'Git commit SHA (release metadata)'
    required: false
    default: ''
  registry:
    description: 'Container registry URL'
    required: false
    default: 'ghcr.io/vig-os/devcontainer'
  output-file:
    description: 'Path for the tar output'
    required: false
    default: '/tmp/image.tar'
  cachix-cache:
    description: 'Cachix binary cache name (passed to flake provisioning)'
    required: false
    default: ''
  cachix-auth-token:
    description: 'Cachix auth token (optional; pulls need no token)'
    required: false
    default: ''

outputs:
  image-tag:
    description: 'Full image tag'
    value: ${{ steps.set-tag.outputs.tag }}
  tar-file:
    description: 'Path to the saved tar file'
    value: ${{ steps.tar-output.outputs.tar-file }}

runs:
  using: composite
  steps:
    - name: Set up environment (provision Nix + toolchain from the flake)
      uses: ./.github/actions/setup-env
      with:
        sync-dependencies: 'true'
        provision-via-flake: 'true'
        cachix-cache: ${{ inputs.cachix-cache }}
        cachix-auth-token: ${{ inputs.cachix-auth-token }}

    - name: Set image tag
      id: set-tag
      shell: bash
      run: |
        TAG="${{ inputs.registry }}:${{ inputs.version }}-${{ inputs.arch }}"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "Image tag: $TAG"

    - name: Build the devcontainer image with Nix
      shell: bash
      run: |
        set -euo pipefail
        # Native per-arch: `nix build` resolves to the runner's own architecture
        # (x86_64-linux / aarch64-linux). buildLayeredImage emits a gzipped OCI
        # tar; docker/podman load handles gzip. The flake sets the OCI labels.
        nix build .#devcontainerImage --print-build-logs
        cp -L result "${{ inputs.output-file }}"
        ls -lL "${{ inputs.output-file }}"

    - name: Verify tar output was created
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -f "${{ inputs.output-file }}" ]; then
          echo "ERROR: Tar file was not created: ${{ inputs.output-file }}"
          echo "Contents of $(dirname ${{ inputs.output-file }}):"
          ls -lh "$(dirname ${{ inputs.output-file }})" || true
          exit 1
        fi

        # Verify file size is reasonable (at least 100MB for a valid image)
        FILE_SIZE=$(stat -c%s "${{ inputs.output-file }}")
        MIN_SIZE=$((100 * 1024 * 1024))  # 100 MB

        if [ "$FILE_SIZE" -lt "$MIN_SIZE" ]; then
          echo "ERROR: Tar file is too small ($FILE_SIZE bytes < $MIN_SIZE bytes)"
          echo "This likely indicates a failed or incomplete build"
          exit 1
        fi

        echo "Tar file created successfully: ${{ inputs.output-file }}"
        echo "Size: $(numfmt --to=iec-i --suffix=B $FILE_SIZE 2>/dev/null || echo $FILE_SIZE bytes)"

    - name: Set tar-file output
      id: tar-output
      shell: bash
      run: echo "tar-file=${{ inputs.output-file }}" >> "$GITHUB_OUTPUT"
