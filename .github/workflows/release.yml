# Release Workflow - Finalize, Build, Test, and Publish
#
# Unified release workflow that handles the complete release process:
# 1. Validate: Check all prerequisites (PR status, CI passed, CHANGELOG ready)
# 2. Finalize: For final releases only, set release date in CHANGELOG
# 3. Build & Test: Build and test images for all architectures
# 4. Publish: Create tag, publish versioned images to GHCR, sign/attest, create draft final GitHub Release (final only)
# 5. Smoke-test: Dispatch downstream validation
# 6. Rollback (on failure): Reset release branch, create issue (tags are not deleted—forward-fix policy; GitHub immutability applies only after a published release locks the tag when that setting is enabled)
#
# Release kinds:
#   candidate: Publishes X.Y.Z-rcN. No CHANGELOG changes, no sync-issues.
#   final:     Publishes X.Y.Z. Sets release date in CHANGELOG, triggers sync-issues, creates draft GitHub Release.
#              GHCR :latest and publishing that draft release run in promote-release.yml after verification (see just promote-release).
#
# Design: Tag and versioned artifacts are created in this workflow; final promotion to :latest is a separate human-gated step.

name: Release

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to release (e.g., 1.2.3)'
        required: true
        type: string
      architectures:
        description: 'Architectures to build (comma-separated: amd64,arm64)'
        required: false
        default: 'amd64,arm64'
        type: string
      release-kind:
        description: 'Release mode: candidate publishes X.Y.Z-rcN, final publishes X.Y.Z'
        required: false
        default: 'candidate'
        type: string
      dry-run:
        description: 'Validate without making changes'
        required: false
        default: false
        type: boolean
      git-user-name:
        description: 'Git user name for commits'
        required: false
        default: 'vigOS Release Bot'
        type: string
      git-user-email:
        description: 'Git user email for commits'
        required: false
        default: 'release@vig-os.local'
        type: string

concurrency:
  # Prevent multiple releases from running simultaneously (race conditions on tags/manifests)
  group: publish-image
  cancel-in-progress: false

permissions:
  contents: read     # safe default; jobs escalate as needed

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      version: ${{ steps.vars.outputs.version }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      release_date: ${{ steps.vars.outputs.release_date }}
      build_timestamp: ${{ steps.vars.outputs.build_timestamp }}
      release_url: ${{ steps.publish_meta.outputs.release_url }}
      release_kind: ${{ steps.vars.outputs.release_kind }}
      publish_version: ${{ steps.publish_meta.outputs.publish_version }}
      next_rc: ${{ steps.publish_meta.outputs.next_rc }}
      pre_finalize_sha: ${{ steps.pre_sha.outputs.pre_finalize_sha }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      architectures: ${{ steps.matrix.outputs.architectures }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate and prepare variables
        id: vars
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_RELEASE_KIND: ${{ github.event.inputs.release-kind }}
        run: |
          set -euo pipefail
          VERSION="$INPUT_VERSION"
          RELEASE_KIND="$INPUT_RELEASE_KIND"

          # Validate semantic version format
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version format '$VERSION'"
            echo "Version must follow semantic versioning format: MAJOR.MINOR.PATCH (e.g., 1.2.3)"
            exit 1
          fi

          if [ "$RELEASE_KIND" != "candidate" ] && [ "$RELEASE_KIND" != "final" ]; then
            echo "ERROR: Invalid release-kind '$RELEASE_KIND'"
            echo "release-kind must be one of: candidate, final"
            exit 1
          fi

          RELEASE_BRANCH="release/$VERSION"
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_kind=$RELEASE_KIND" >> $GITHUB_OUTPUT
          echo "release_date=$RELEASE_DATE" >> $GITHUB_OUTPUT
          echo "build_timestamp=$BUILD_TIMESTAMP" >> $GITHUB_OUTPUT
          echo "release_branch=$RELEASE_BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout release branch
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          retry --retries 3 --backoff 3 --max-backoff 20 -- git fetch origin "release/$VERSION" || {
            echo "ERROR: Release branch not found: release/$VERSION"
            echo "Did you run: just prepare-release $VERSION"
            exit 1
          }
          git checkout "origin/release/$VERSION"

      - name: Record pre-finalization SHA
        id: pre_sha
        run: |
          PRE_FINALIZE_SHA=$(git rev-parse HEAD)
          echo "pre_finalize_sha=$PRE_FINALIZE_SHA" >> $GITHUB_OUTPUT
          echo "Pre-finalization SHA: $PRE_FINALIZE_SHA"

      - name: Compute publish version
        id: publish_meta
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          RELEASE_KIND: ${{ steps.vars.outputs.release_kind }}
        run: |
          set -euo pipefail

          NEXT_RC=""
          if [ "$RELEASE_KIND" = "candidate" ]; then
            TAG_PATTERN="${VERSION}-rc*"
            EXISTING_TAGS=$(git ls-remote --tags --refs origin "$TAG_PATTERN" | awk '{print $2}' | sed 's#refs/tags/##')

            MAX_RC=0
            if [ -n "$EXISTING_TAGS" ]; then
              while IFS= read -r tag; do
                [ -z "$tag" ] && continue

                rc_prefix="${VERSION}-rc"
                if [[ "$tag" != "$rc_prefix"* ]]; then
                  echo "ERROR: Malformed candidate tag detected: $tag"
                  echo "Expected format: ${VERSION}-rcN"
                  exit 1
                fi

                rc_num="${tag#"$rc_prefix"}"
                if ! printf '%s' "$rc_num" | grep -qE '^[0-9]+$'; then
                  echo "ERROR: Malformed candidate tag detected: $tag"
                  echo "Expected format: ${VERSION}-rcN"
                  exit 1
                fi

                if [ "$rc_num" -gt "$MAX_RC" ]; then
                  MAX_RC="$rc_num"
                fi
              done <<< "$EXISTING_TAGS"
            fi

            NEXT_RC=$((MAX_RC + 1))
            PUBLISH_VERSION="${VERSION}-rc${NEXT_RC}"
          else
            PUBLISH_VERSION="$VERSION"
          fi

          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${PUBLISH_VERSION}"
          echo "publish_version=$PUBLISH_VERSION" >> $GITHUB_OUTPUT
          echo "next_rc=$NEXT_RC" >> $GITHUB_OUTPUT
          echo "release_url=$RELEASE_URL" >> $GITHUB_OUTPUT
          echo "Publish version: $PUBLISH_VERSION"

      - name: Find latest RC tag
        if: steps.vars.outputs.release_kind == 'final'
        id: latest_rc
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          TAG_PATTERN="${VERSION}-rc*"
          EXISTING_TAGS=$(git ls-remote --tags --refs origin "$TAG_PATTERN" \
            | awk '{print $2}' | sed 's#refs/tags/##')

          if [ -z "$EXISTING_TAGS" ]; then
            echo "ERROR: No RC tags found for version $VERSION"
            echo "Publish at least one candidate before finalizing: just publish-candidate $VERSION"
            exit 1
          fi

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue

            rc_prefix="${VERSION}-rc"
            if [[ "$tag" != "$rc_prefix"* ]]; then
              echo "ERROR: Malformed candidate tag detected: $tag"
              echo "Expected format: ${VERSION}-rcN"
              exit 1
            fi

            rc_num="${tag#"$rc_prefix"}"
            if ! printf '%s' "$rc_num" | grep -qE '^[0-9]+$'; then
              echo "ERROR: Malformed candidate tag detected: $tag"
              echo "Expected format: ${VERSION}-rcN"
              exit 1
            fi
          done <<< "$EXISTING_TAGS"

          LATEST_RC=$(echo "$EXISTING_TAGS" | sort -V | tail -1)
          echo "latest_rc=$LATEST_RC" >> "$GITHUB_OUTPUT"
          echo "Latest RC: $LATEST_RC"

      - name: Verify CHANGELOG has TBD entry
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          if ! grep -q "## \[$VERSION\] - TBD" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md does not contain '## [$VERSION] - TBD'"
            exit 1
          fi

      - name: Verify GitHub Release does not block publish
        env:
          PUBLISH_VERSION: ${{ steps.publish_meta.outputs.publish_version }}
          RELEASE_KIND: ${{ steps.vars.outputs.release_kind }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Classify GitHub API errors: auth failures fail fast; 404 means no release; transient errors retry.
          RETRIES=5
          LAST_ERROR=""
          for i in $(seq 1 "$RETRIES"); do
            API_OUTPUT=""
            if API_OUTPUT=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${PUBLISH_VERSION}" 2>&1); then
              if [ "$RELEASE_KIND" = "final" ]; then
                IS_DRAFT=$(printf '%s' "$API_OUTPUT" | jq -r '.draft')
                if [ "$IS_DRAFT" = "true" ]; then
                  echo "Draft GitHub Release already exists for $PUBLISH_VERSION; publish job may retry release creation."
                  exit 0
                fi
                echo "ERROR: Published (non-draft) GitHub Release already exists for $PUBLISH_VERSION"
                echo "Immutable releases cannot be replaced; use a patch version if a new release is required."
                exit 1
              fi
              echo "ERROR: GitHub Release already exists for $PUBLISH_VERSION"
              exit 1
            fi

            LAST_ERROR="$API_OUTPUT"
            if printf '%s' "$API_OUTPUT" | grep -Eqi "401|403|forbidden|bad credentials|authentication|authorization|insufficient scopes"; then
              echo "ERROR: Non-retryable authentication/authorization failure while checking for existing GitHub Release for $PUBLISH_VERSION"
              echo "$API_OUTPUT"
              exit 1
            fi

            if printf '%s' "$API_OUTPUT" | grep -Eqi "not found|HTTP 404"; then
              echo "No existing GitHub Release for $PUBLISH_VERSION (API reports not found)."
              exit 0
            fi

            if printf '%s' "$API_OUTPUT" | grep -Eqi "429|5[0-9]{2}|timed out|timeout|temporary|connection reset|connection refused|network|tls"; then
              if [ "$i" -lt "$RETRIES" ]; then
                BACKOFF=$((i * 5))
                echo "Release existence check failed transiently, retrying in ${BACKOFF}s ($i/$RETRIES)..."
                sleep "$BACKOFF"
              fi
              continue
            fi

            echo "ERROR: Unexpected response while checking for existing GitHub Release for $PUBLISH_VERSION"
            echo "$API_OUTPUT"
            exit 1
          done

          echo "ERROR: Unable to determine whether a GitHub Release exists for $PUBLISH_VERSION after $RETRIES attempts (fail closed)."
          if [ -n "$LAST_ERROR" ]; then
            echo "Last API error:"
            echo "$LAST_ERROR"
          fi
          exit 1

      - name: Set up GitHub CLI
        run: |
          gh version
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Find and verify PR
        id: pr
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RELEASE_BRANCH="release/$VERSION"

          # Find PR from release branch to main
          PR_JSON=$(retry --retries 3 --backoff 5 --max-backoff 30 -- gh pr list \
            --head "$RELEASE_BRANCH" \
            --base main \
            --json number,isDraft,reviewDecision,statusCheckRollup \
            --limit 1)

          PR_COUNT=$(echo "$PR_JSON" | jq 'length')

          if [ "$PR_COUNT" != "1" ]; then
            if [ "$PR_COUNT" = "0" ]; then
              echo "ERROR: No PR found from $RELEASE_BRANCH to main"
              exit 1
            else
              echo "ERROR: Multiple PRs found from $RELEASE_BRANCH to main"
              exit 1
            fi
          fi

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number')
          IS_DRAFT=$(echo "$PR_JSON" | jq -r '.[0].isDraft')
          REVIEW_DECISION=$(echo "$PR_JSON" | jq -r '.[0].reviewDecision')

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

          if [ "$IS_DRAFT" = "true" ]; then
            echo "ERROR: PR #$PR_NUMBER is still in draft status"
            echo "Mark it ready for review first: gh pr ready $PR_NUMBER"
            exit 1
          fi

          if [ "$REVIEW_DECISION" = "APPROVED" ]; then
            echo "PR #$PR_NUMBER is approved"
          elif [ "$REVIEW_DECISION" = "null" ] || [ -z "$REVIEW_DECISION" ]; then
            # Bot approval fallback when gh pr list leaves reviewDecision empty (#438)
            APPROVED_COUNT=$(retry --retries 3 --backoff 5 --max-backoff 30 -- gh api \
              --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" \
              | jq 'add | map(select(.state == "APPROVED")) | length')
            if [ "$APPROVED_COUNT" -eq 0 ]; then
              echo "ERROR: PR #$PR_NUMBER does not have approvals (reviewDecision: $REVIEW_DECISION, approved reviews: 0)"
              exit 1
            fi
            echo "reviewDecision='$REVIEW_DECISION' but $APPROVED_COUNT approved review(s) found"
          else
            echo "ERROR: PR #$PR_NUMBER does not have approvals (status: $REVIEW_DECISION)"
            exit 1
          fi

          # Check CI status
          STATUS_ROLLUP=$(echo "$PR_JSON" | jq -r '.[0].statusCheckRollup // []')

          # Reject if any checks have failed or errored
          CI_FAILED=$(echo "$STATUS_ROLLUP" | jq '[.[] | select(.conclusion == "FAILURE" or .conclusion == "ERROR")] | length')
          if [ "$CI_FAILED" != "0" ]; then
            echo "ERROR: PR #$PR_NUMBER has failed CI checks"
            echo "Fix CI issues before releasing"
            exit 1
          fi

          # Reject if any checks are still pending, in progress, queued, or null (non-terminal state)
          CI_PENDING=$(echo "$STATUS_ROLLUP" | jq '[.[] | select(.conclusion == null or .conclusion == "" or .conclusion == "PENDING" or .conclusion == "IN_PROGRESS" or .conclusion == "QUEUED")] | length')
          if [ "$CI_PENDING" != "0" ]; then
            echo "ERROR: PR #$PR_NUMBER has $CI_PENDING checks still in progress"
            echo "Wait for all CI checks to complete before releasing"
            exit 1
          fi

          # Check that at least some checks have passed
          CI_SUCCESS=$(echo "$STATUS_ROLLUP" | jq '[.[] | select(.conclusion == "SUCCESS")] | length')
          if [ "$CI_SUCCESS" = "0" ]; then
            echo "ERROR: PR #$PR_NUMBER has no successful CI checks"
            echo "Ensure CI has run on the release branch"
            exit 1
          fi

          echo "✓ PR #$PR_NUMBER verified: ready and approved"

      - name: Validate and parse architectures
        id: matrix
        env:
          INPUT_ARCHITECTURES: ${{ github.event.inputs.architectures }}
        run: |
          set -euo pipefail

          ARCHS="$INPUT_ARCHITECTURES"
          echo "Input architectures: $ARCHS"

          # Remove spaces and convert to array
          ARCHS=$(echo "$ARCHS" | tr -d ' ')
          IFS=',' read -ra ARCH_ARRAY <<< "$ARCHS"

          # Validate each architecture
          VALID_ARCHS="amd64 arm64"
          VALIDATED_ARCHS=()

          for arch in "${ARCH_ARRAY[@]}"; do
            if [[ " $VALID_ARCHS " =~ " $arch " ]]; then
              VALIDATED_ARCHS+=("$arch")
              echo "✓ Valid architecture: $arch"
            else
              echo "ERROR: Invalid architecture '$arch'"
              exit 1
            fi
          done

          # Check for duplicates
          UNIQUE_ARCHS=($(echo "${VALIDATED_ARCHS[@]}" | tr ' ' '\n' | sort -u))
          if [ ${#UNIQUE_ARCHS[@]} -ne ${#VALIDATED_ARCHS[@]} ]; then
            echo "ERROR: Duplicate architectures found"
            exit 1
          fi

          # Generate matrix JSON
          MATRIX_JSON=$(printf '%s\n' "${VALIDATED_ARCHS[@]}" | jq -R . | jq -s -c '{arch: .}')

          echo "architectures=${VALIDATED_ARCHS[*]}" >> $GITHUB_OUTPUT
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

      - name: Summary
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          RELEASE_KIND: ${{ steps.vars.outputs.release_kind }}
          PUBLISH_VERSION: ${{ steps.publish_meta.outputs.publish_version }}
          NEXT_RC: ${{ steps.publish_meta.outputs.next_rc }}
          LATEST_RC: ${{ steps.latest_rc.outputs.latest_rc }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          RELEASE_DATE: ${{ steps.vars.outputs.release_date }}
          ARCHITECTURES: ${{ steps.matrix.outputs.architectures }}
          DRY_RUN: ${{ github.event.inputs.dry-run }}
        run: |
          echo "✓ All validation checks passed"
          echo ""
          echo "Release Configuration:"
          echo "  Version: $VERSION"
          echo "  Release Kind: $RELEASE_KIND"
          echo "  Publish Tag: $PUBLISH_VERSION"
          if [ -n "$NEXT_RC" ]; then
            echo "  Next RC Number: $NEXT_RC"
          fi
          if [ "$RELEASE_KIND" = "final" ]; then
            echo "  Latest RC: $LATEST_RC"
          fi
          echo "  Release Branch: release/$VERSION"
          echo "  PR: #$PR_NUMBER"
          echo "  Release Date: $RELEASE_DATE"
          echo "  Architectures: $ARCHITECTURES"
          echo "  Dry-run: $DRY_RUN"

  finalize:
    name: Finalize Release
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: ${{ github.event.inputs.dry-run != 'true' }}
    permissions:
      contents: write    # read release branch (fetch/reset)
      actions: write     # trigger sync-issues workflow
    outputs:
      finalize_sha: ${{ steps.finalize.outputs.finalize_sha }}
      tag_already_exists: ${{ steps.tag_state.outputs.tag_already_exists }}

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Generate Commit App Token
        id: commit-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          client-id: ${{ secrets.COMMIT_APP_CLIENT_ID }}
          private-key: ${{ secrets.COMMIT_APP_PRIVATE_KEY }}

      - name: Checkout release branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: release/${{ needs.validate.outputs.version }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Set release date in CHANGELOG
        if: needs.validate.outputs.release_kind == 'final'
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_DATE: ${{ needs.validate.outputs.release_date }}
        run: |
          set -euo pipefail
          uv run prepare-changelog finalize "$VERSION" "$RELEASE_DATE"
          echo "✓ Release date set in CHANGELOG.md"

      - name: Regenerate docs for finalized release
        if: needs.validate.outputs.release_kind == 'final'
        run: |
          set -euo pipefail
          uv run python docs/generate.py
          echo "✓ Regenerated docs from finalized CHANGELOG.md"

      - name: Sync workspace manifest for finalized release
        if: needs.validate.outputs.release_kind == 'final'
        run: |
          set -euo pipefail
          uv run python scripts/sync_manifest.py sync assets/workspace/
          echo "✓ Synced workspace manifest after changelog finalization"

      - name: Update root .vig-os to release version
        if: needs.validate.outputs.release_kind == 'final'
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          sed -i "s/^DEVCONTAINER_VERSION=.*/DEVCONTAINER_VERSION=$VERSION/" .vig-os
          echo "✓ Set DEVCONTAINER_VERSION=$VERSION in .vig-os"

      - name: Collect finalization files
        if: needs.validate.outputs.release_kind == 'final'
        id: finalize-files
        run: |
          set -euo pipefail

          CHANGED_FILES="$(git diff --name-only)"
          if [ -z "$CHANGED_FILES" ]; then
            echo "ERROR: Finalization produced no tracked file changes."
            echo "Expected CHANGELOG.md and possibly generated docs to change."
            exit 1
          fi

          FILE_PATHS="$(echo "$CHANGED_FILES" | tr '\n' ',' | sed 's/,$//')"
          echo "file_paths=$FILE_PATHS" >> "$GITHUB_OUTPUT"
          echo "Finalization files: $FILE_PATHS"

          for expected_doc in README.md CONTRIBUTE.md TESTING.md docs/SKILL_PIPELINE.md; do
            if git diff --quiet -- "$expected_doc"; then
              continue
            fi
            if ! printf '%s\n' "$CHANGED_FILES" | grep -Fxq -- "$expected_doc"; then
              echo "ERROR: Expected modified doc '$expected_doc' missing from commit file list."
              exit 1
            fi
          done

      - name: Commit finalization changes via API
        if: needs.validate.outputs.release_kind == 'final'
        uses: vig-os/commit-action@1bc004353d08d9332a0cb54920b148256220c8e0  # v0.2.0
        env:
          GH_TOKEN: ${{ steps.commit-app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_BRANCH: refs/heads/release/${{ needs.validate.outputs.version }}
          MAX_ATTEMPTS: "3"
          COMMIT_MESSAGE: |-
            chore: finalize release ${{ needs.validate.outputs.version }}

            Set release date to ${{ needs.validate.outputs.release_date }} and regenerate release docs.

            Refs: #${{ needs.validate.outputs.pr_number }}
          FILE_PATHS: ${{ steps.finalize-files.outputs.file_paths }}

      - name: Pull remote changes
        if: needs.validate.outputs.release_kind == 'final'
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          retry --retries 3 --backoff 3 --max-backoff 20 -- git fetch origin "release/$VERSION"
          git reset --hard "origin/release/$VERSION"
          echo "✓ Synced with remote release branch"

      - name: Verify CHANGELOG finalized (no TBD)
        if: needs.validate.outputs.release_kind == 'final'
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          if grep -Fq "## [${VERSION}] - TBD" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md still contains TBD for $VERSION after finalize commit"
            exit 1
          fi
          echo "✓ CHANGELOG.md has finalized date for $VERSION"

      - name: Refresh release PR body from finalized changelog
        if: needs.validate.outputs.release_kind == 'final'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_DATE: ${{ needs.validate.outputs.release_date }}
          PR_NUMBER: ${{ needs.validate.outputs.pr_number }}
        run: |
          set -euo pipefail
          CHANGELOG_CONTENT=$(awk -v hdr="## [${VERSION}]" '
            index($0, hdr) == 1 { p = 1; print; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG_CONTENT" ]; then
            echo "ERROR: Could not extract release section for version $VERSION from CHANGELOG.md"
            exit 1
          fi

          # GitHub caps PR bodies at 65536 chars; a large finalized release
          # changelog can overflow it (#810). Truncate at a line boundary and
          # point to the full CHANGELOG.md on the release branch when it does.
          MAX_BODY=65000
          RELEASE_BRANCH="release/$VERSION"
          HEADER="# [Release $VERSION](https://github.com/${GITHUB_REPOSITORY}/releases/tag/$VERSION) - $RELEASE_DATE

          This PR prepares release $VERSION for merge to main.

          "
          PR_BODY="${HEADER}${CHANGELOG_CONTENT}"$'\n'

          if [ "${#PR_BODY}" -gt "$MAX_BODY" ]; then
            NOTE=$(printf '\n\n_Changelog truncated to fit GitHub'"'"'s %s-char PR-body limit; see `CHANGELOG.md` on `%s` for the full entry._' "$MAX_BODY" "$RELEASE_BRANCH")
            budget=$(( MAX_BODY - ${#HEADER} - ${#NOTE} ))
            TRUNCATED="${CHANGELOG_CONTENT:0:budget}"
            TRUNCATED="${TRUNCATED%$'\n'*}"
            PR_BODY="${HEADER}${TRUNCATED}${NOTE}"
          fi

          printf '%s' "$PR_BODY" > /tmp/release-pr-body.md

          retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh pr edit "$PR_NUMBER" --body-file /tmp/release-pr-body.md
          echo "✓ Refreshed PR #$PR_NUMBER body from finalized CHANGELOG.md"

      - name: Output finalize SHA
        id: finalize
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_KIND: ${{ needs.validate.outputs.release_kind }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "$RELEASE_KIND" = "final" ]; then
            FINALIZE_SHA=$(git rev-parse HEAD)
          else
            FINALIZE_SHA=$(retry --retries 3 --backoff 5 --max-backoff 30 -- \
              gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/release/$VERSION" --jq '.object.sha')
          fi
          echo "finalize_sha=$FINALIZE_SHA" >> $GITHUB_OUTPUT
          echo "Release kind: $RELEASE_KIND — SHA: $FINALIZE_SHA"

      - name: Check if publish tag already exists at finalize SHA
        id: tag_state
        env:
          PUBLISH_VERSION: ${{ needs.validate.outputs.publish_version }}
          FINALIZE_SHA: ${{ steps.finalize.outputs.finalize_sha }}
        run: |
          set -euo pipefail
          REMOTE_LINE=$(git ls-remote origin "refs/tags/${PUBLISH_VERSION}^{}" || true)
          if [ -z "$REMOTE_LINE" ]; then
            REMOTE_LINE=$(git ls-remote origin "refs/tags/${PUBLISH_VERSION}" || true)
          fi
          if [ -z "$REMOTE_LINE" ]; then
            echo "tag_already_exists=false" >> "$GITHUB_OUTPUT"
            echo "No remote tag ${PUBLISH_VERSION} yet"
            exit 0
          fi
          REMOTE_TARGET_SHA=$(printf '%s\n' "$REMOTE_LINE" | awk '{print $1}')
          if [ -z "$REMOTE_TARGET_SHA" ]; then
            echo "tag_already_exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$REMOTE_TARGET_SHA" != "$FINALIZE_SHA" ]; then
            echo "ERROR: Tag $PUBLISH_VERSION exists but target commit is $REMOTE_TARGET_SHA; expected $FINALIZE_SHA (finalize SHA)"
            exit 1
          fi
          echo "tag_already_exists=true" >> "$GITHUB_OUTPUT"
          echo "Remote tag $PUBLISH_VERSION already points to finalize SHA; publish will skip tag create/push"

      - name: Trigger sync-issues workflow and wait
        if: needs.validate.outputs.release_kind == 'final'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          TIMEOUT=120
          INTERVAL=10
          ELAPSED=0

          declare -A before_map=()
          while read -r id; do
            [ -z "$id" ] && continue
            before_map[$id]=1
          done < <(gh run list --workflow sync-issues.yml --json databaseId --jq -r '.[].databaseId')

          echo "Triggering sync-issues workflow..."
          retry --retries 2 --backoff 5 --max-backoff 20 -- gh workflow run sync-issues.yml \
            -f "target-branch=release/$VERSION"
          echo "✓ sync-issues workflow triggered"

          RUN_ID=""
          sleep 3
          ELAPSED=3

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if [ -z "$RUN_ID" ]; then
              while read -r id; do
                [ -z "$id" ] && continue
                [ -n "${before_map[$id]+x}" ] && continue
                RUN_ID=$id
                echo "Resolved sync-issues run id: $RUN_ID"
                break
              done < <(gh run list --workflow sync-issues.yml --json databaseId --jq -r '.[].databaseId')
            fi

            if [ -n "$RUN_ID" ]; then
              RUN_STATUS=$(gh run view "$RUN_ID" --json status --jq -r '.status' 2>/dev/null || echo "unknown")
              if [ "$RUN_STATUS" = "completed" ]; then
                RUN_CONCLUSION=$(gh run view "$RUN_ID" --json conclusion --jq -r '.conclusion' 2>/dev/null || echo "unknown")
                if [ "$RUN_CONCLUSION" = "success" ]; then
                  echo "✓ sync-issues workflow completed successfully"
                else
                  echo "⚠ sync-issues workflow completed with status: $RUN_CONCLUSION"
                fi
                break
              fi
            fi

            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
            echo "Waiting for sync-issues... (${ELAPSED}s / ${TIMEOUT}s)"
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "⚠ Timed out waiting for sync-issues workflow"
            echo "The release may continue, but PR documentation may not be synced"
          fi

  build-and-test:
    name: Build and Test (${{ matrix.arch }})
    needs: [validate, finalize]
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    timeout-minutes: 60
    strategy:
      matrix: ${{ fromJson(needs.validate.outputs.matrix) }}
      fail-fast: true

    steps:
      - name: Checkout release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.finalize.outputs.finalize_sha }}

      - name: Build container image
        id: build
        uses: ./.github/actions/build-image
        with:
          version: ${{ needs.validate.outputs.publish_version }}
          arch: ${{ matrix.arch }}
          release-date: ${{ needs.validate.outputs.release_date }}
          release-url: ${{ needs.validate.outputs.release_url }}
          build-timestamp: ${{ needs.validate.outputs.build_timestamp }}
          vcs-ref: ${{ github.sha }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          output-file: /tmp/image.tar
          # Trusted publish path: BLOCKING push of the image closure to Cachix so
          # released images are cache-backed (consumers substitute, not rebuild).
          push-image-closure: 'true'

      - name: Run image tests
        uses: ./.github/actions/test-image
        with:
          image-tag: ${{ needs.validate.outputs.publish_version }}-${{ matrix.arch }}
          image-source: tar
          tar-file: /tmp/image.tar
          ref: ${{ needs.finalize.outputs.finalize_sha }}

      - name: Run integration tests
        uses: ./.github/actions/test-integration
        with:
          image-tag: ${{ needs.validate.outputs.publish_version }}-${{ matrix.arch }}
          ref: ${{ needs.finalize.outputs.finalize_sha }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          version: 'v0.71.2'
          input: /tmp/image.tar
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      - name: Upload tested image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: container-image-${{ needs.validate.outputs.publish_version }}-${{ matrix.arch }}
          path: /tmp/image.tar
          retention-days: 1
          compression-level: 0

      - name: Summary
        run: |
          echo "✓ Build, tests, and security scan passed for ${{ matrix.arch }}"

  vulnix-gate:
    name: Vulnix CVE Gate
    needs: [validate, finalize]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.finalize.outputs.finalize_sha }}

      - name: Set up environment (Nix flake + uv for the gate)
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate .vulnixignore exception expirations
        run: uv run check-expirations .vulnixignore

      - name: Build the vulnix scan target (image package closure)
        run: |
          set -euo pipefail
          nix build .#devcontainerImageEnv --print-build-logs

      # First-class, BLOCKING push of the scan-target closure to Cachix (#776) so
      # the CVE-scan closure is cache-backed too (nightly + re-runs substitute it
      # instead of rebuilding). setup-env already ran cachix-action, installing
      # `cachix` and configuring push auth. Guarded on
      # the cache being set; the release path always carries the auth token.
      - name: Push scan-target closure to Cachix (blocking)
        if: vars.CACHIX_CACHE != ''
        env:
          CACHIX_CACHE: ${{ vars.CACHIX_CACHE }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          nix path-info --recursive ./result | cachix push "$CACHIX_CACHE"

      - name: Run vulnix (primary CVE scanner)
        # Mirrors security-scan.yml: vulnix exit codes 0=clean, 1=only
        # whitelisted (needs -s), 2=reportable advisories (the gate, not the
        # scan, decides pass/fail). Any code > 2 means the scan itself failed —
        # fail the job instead of masking the crash as an empty, clean result.
        # The || rc=$? capture is load-bearing (#842): the runner shell is
        # `bash -e`, so an uncaptured exit 2 (findings present) would abort
        # the step before the vulnix-gate ever evaluates .vulnixignore.
        run: |
          set -uo pipefail
          rc=0
          for attempt in 1 2 3; do
            rc=0
            nix run .#vulnix -- --closure ./result --json > vulnix-findings.json || rc=$?
            [ "$rc" -le 2 ] && jq -e . vulnix-findings.json > /dev/null 2>&1 && break
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::vulnix scan attempt ${attempt} failed (exit ${rc}); retrying in $((60 * attempt))s"
              sleep $((60 * attempt))
            fi
          done
          [ "$rc" -le 2 ] && jq -e . vulnix-findings.json > /dev/null 2>&1 \
            || { echo "::error::vulnix scan failed after 3 attempts (exit $rc)"; exit 1; }

      - name: Gate on unexcepted HIGH/CRITICAL vulnix findings
        id: vulnix-gate
        # BLOCKING (#639): fails on any HIGH/CRITICAL not covered by a
        # non-expired entry in .vulnixignore. Reuses vig_utils.vulnix_gate (the
        # same gate the nightly security-scan runs) so the publish job below
        # cannot proceed on a CVE the nightly would have blocked.
        run: uv run vulnix-gate vulnix-findings.json --register .vulnixignore

  publish:
    name: Publish Release
    needs: [validate, finalize, build-and-test, vulnix-gate]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write       # create and push tags
      packages: write       # push images to GHCR
      id-token: write       # keyless cosign signing via OIDC
      attestations: write   # build provenance attestations
      artifact-metadata: write  # persist attestation storage records

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.finalize.outputs.finalize_sha }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Configure git
        env:
          GIT_USER_NAME: ${{ github.event.inputs.git-user-name }}
          GIT_USER_EMAIL: ${{ github.event.inputs.git-user-email }}
        run: |
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"

      - name: Create annotated tag
        if: ${{ needs.finalize.outputs.tag_already_exists != 'true' }}
        env:
          PUBLISH_VERSION: ${{ needs.validate.outputs.publish_version }}
        run: |
          set -euo pipefail
          git tag -a "$PUBLISH_VERSION" -m "Release $PUBLISH_VERSION"
          echo "✓ Tag created: $PUBLISH_VERSION"

      - name: Push tag
        if: ${{ needs.finalize.outputs.tag_already_exists != 'true' }}
        env:
          PUBLISH_VERSION: ${{ needs.validate.outputs.publish_version }}
          RELEASE_KIND: ${{ needs.validate.outputs.release_kind }}
        run: |
          set -euo pipefail
          if [ "$RELEASE_KIND" = "candidate" ]; then
            if retry --retries 3 --backoff 5 --max-backoff 30 -- git ls-remote --tags --refs origin "$PUBLISH_VERSION" | grep -q "refs/tags/$PUBLISH_VERSION$"; then
              echo "ERROR: Candidate tag '$PUBLISH_VERSION' already exists on origin"
              echo "Another candidate publish likely completed concurrently; re-run workflow to infer next RC."
              exit 1
            fi
          fi

          if ! retry --retries 3 --backoff 5 --max-backoff 30 -- git push origin "$PUBLISH_VERSION"; then
            if retry --retries 3 --backoff 5 --max-backoff 30 -- git ls-remote --tags --refs origin "$PUBLISH_VERSION" | grep -q "refs/tags/$PUBLISH_VERSION$"; then
              LOCAL_TAG_TARGET_SHA=$(git rev-parse "$PUBLISH_VERSION^{}")
              REMOTE_TAG_TARGET_SHA=$(retry --retries 3 --backoff 5 --max-backoff 30 -- git ls-remote --tags origin "refs/tags/$PUBLISH_VERSION^{}" | awk '{print $1}')
              if [ -z "$REMOTE_TAG_TARGET_SHA" ]; then
                REMOTE_TAG_TARGET_SHA=$(retry --retries 3 --backoff 5 --max-backoff 30 -- git ls-remote --tags origin "refs/tags/$PUBLISH_VERSION" | awk '{print $1}')
              fi
              if [ -z "$REMOTE_TAG_TARGET_SHA" ]; then
                echo "ERROR: Remote tag exists but target SHA could not be resolved: $PUBLISH_VERSION"
                exit 1
              fi
              if [ "$REMOTE_TAG_TARGET_SHA" != "$LOCAL_TAG_TARGET_SHA" ]; then
                echo "ERROR: Remote tag target SHA mismatch for $PUBLISH_VERSION"
                echo "Local tag target:  $LOCAL_TAG_TARGET_SHA"
                echo "Remote tag target: $REMOTE_TAG_TARGET_SHA"
                exit 1
              fi
              echo "Tag already present on origin with matching target SHA: $PUBLISH_VERSION"
            else
              echo "ERROR: Failed to push tag $PUBLISH_VERSION"
              exit 1
            fi
          fi
          echo "✓ Tag pushed: $PUBLISH_VERSION"

      - name: Generate final release notes from CHANGELOG
        if: needs.validate.outputs.release_kind == 'final'
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          awk -v hdr="## [${VERSION}]" '
            index($0, hdr) == 1 {found=1; next}
            /^## \[/ && found {found=0}
            found {print}
          ' CHANGELOG.md > /tmp/github-release-notes.md

          if [ ! -s /tmp/github-release-notes.md ]; then
            echo "ERROR: Failed to generate GitHub Release notes for $VERSION from CHANGELOG.md"
            echo "Expected heading like: ## [$VERSION] - YYYY-MM-DD or ## [$VERSION](url) - YYYY-MM-DD"
            exit 1
          fi

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Download image artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/images
          pattern: container-image-${{ needs.validate.outputs.publish_version }}-*

      - name: Load and push images
        env:
          BUILD_VERSION: ${{ needs.validate.outputs.publish_version }}
          PUBLISH_VERSION: ${{ needs.validate.outputs.publish_version }}
          ARCHS: ${{ needs.validate.outputs.architectures }}
        run: |
          set -euo pipefail
          REPO="ghcr.io/vig-os/devcontainer"

          IFS=' ' read -ra ARCH_ARRAY <<< "$ARCHS"

          for arch in "${ARCH_ARRAY[@]}"; do
            ARTIFACT_PATH="/tmp/images/container-image-${BUILD_VERSION}-${arch}"

            if [ ! -f "$ARTIFACT_PATH/image.tar" ]; then
              echo "ERROR: Artifact not found: $ARTIFACT_PATH/image.tar"
              ls -lh /tmp/images/
              exit 1
            fi

            echo "Loading $arch image..."
            # Read back whatever tag the flake stamped (e.g. `nix-dev`) rather
            # than assuming `$BUILD_VERSION-$arch`; the Nix image is saved
            # verbatim and never carries the versioned tag.
            SOURCE_IMAGE_TAG="$(docker load < "$ARTIFACT_PATH/image.tar" \
              | sed -n 's/^Loaded image: //p' | head -n1)"
            echo "Loaded: $SOURCE_IMAGE_TAG"
            IMAGE_TAG="$REPO:$PUBLISH_VERSION-$arch"
            docker tag "$SOURCE_IMAGE_TAG" "$IMAGE_TAG"
            echo "Pushing $arch image: $IMAGE_TAG"
            retry --retries 3 --backoff 3 --max-backoff 3 -- docker push "$IMAGE_TAG"
            echo "✓ Pushed: $IMAGE_TAG"
          done

      - name: Create multi-arch manifest
        env:
          PUBLISH_VERSION: ${{ needs.validate.outputs.publish_version }}
          ARCHS: ${{ needs.validate.outputs.architectures }}
        run: |
          set -euo pipefail
          REPO="ghcr.io/vig-os/devcontainer"

          IFS=' ' read -ra ARCH_ARRAY <<< "$ARCHS"

          # Build image list for manifest
          ARCH_IMAGES=()
          for arch in "${ARCH_ARRAY[@]}"; do
            ARCH_IMAGES+=("$REPO:$PUBLISH_VERSION-$arch")
            echo "Including in manifest: $REPO:$PUBLISH_VERSION-$arch"
          done

          echo "Creating version manifest: $REPO:$PUBLISH_VERSION"
          retry --retries 3 --backoff 3 --max-backoff 3 -- \
            docker buildx imagetools create \
              --tag "$REPO:$PUBLISH_VERSION" \
              "${ARCH_IMAGES[@]}"
          echo "✓ Created version manifest: $REPO:$PUBLISH_VERSION"

      - name: Verify manifests
        env:
          PUBLISH_VERSION: ${{ needs.validate.outputs.publish_version }}
          ARCHS: ${{ needs.validate.outputs.architectures }}
        run: |
          set -euo pipefail
          REPO="ghcr.io/vig-os/devcontainer"

          IFS=' ' read -ra ARCH_ARRAY <<< "$ARCHS"

          echo "Verifying version manifest: $REPO:$PUBLISH_VERSION"
          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            if docker buildx imagetools inspect "$REPO:$PUBLISH_VERSION" >/dev/null 2>&1; then
              echo "✓ Version manifest verified"
              break
            else
              if [ $i -lt $RETRIES ]; then
                echo "Verification failed, retrying ($i/$RETRIES)..."
                sleep 5
              else
                echo "ERROR: Version manifest verification failed"
                exit 1
              fi
            fi
          done

      - name: Generate SBOM (attempt 1)
        id: sbom_generate
        continue-on-error: true
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ghcr.io/vig-os/devcontainer:${{ needs.validate.outputs.publish_version }}
          artifact-name: sbom-${{ needs.validate.outputs.publish_version }}.spdx.json
          output-file: /tmp/sbom.spdx.json
          format: spdx-json

      - name: Wait before retrying SBOM generation
        if: steps.sbom_generate.outcome == 'failure'
        run: sleep 15

      - name: Generate SBOM (retry)
        if: steps.sbom_generate.outcome == 'failure'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ghcr.io/vig-os/devcontainer:${{ needs.validate.outputs.publish_version }}
          artifact-name: sbom-${{ needs.validate.outputs.publish_version }}.spdx.json
          output-file: /tmp/sbom.spdx.json
          format: spdx-json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-${{ needs.validate.outputs.publish_version }}
          path: /tmp/sbom.spdx.json
          retention-days: 90

      - name: Sign container image with cosign
        env:
          PUBLISH_VERSION: ${{ needs.validate.outputs.publish_version }}
        run: |
          set -euo pipefail
          REPO="ghcr.io/vig-os/devcontainer"

          # Get the digest for the multi-arch manifest
          DIGEST=$(retry --retries 3 --backoff 5 --max-backoff 30 -- \
            docker buildx imagetools inspect "$REPO:$PUBLISH_VERSION" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "Signing image: $REPO@$DIGEST"

          # Keyless signing using GitHub Actions OIDC identity
          retry --retries 3 --backoff 15 --max-backoff 15 -- \
            cosign sign --yes "$REPO@$DIGEST"
          echo "✓ Image signed with cosign (keyless)"

      - name: Capture image digest for attestation
        id: digest
        env:
          PUBLISH_VERSION: ${{ needs.validate.outputs.publish_version }}
        run: |
          set -euo pipefail
          REPO="ghcr.io/vig-os/devcontainer"
          DIGEST=$(retry --retries 3 --backoff 5 --max-backoff 30 -- \
            docker buildx imagetools inspect "$REPO:$PUBLISH_VERSION" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Image digest: $DIGEST"

      - name: Attest build provenance (attempt 1)
        id: attest_provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-name: ghcr.io/vig-os/devcontainer
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Wait before retrying build provenance attestation
        if: steps.attest_provenance.outcome == 'failure'
        run: sleep 30

      - name: Attest build provenance (retry)
        if: steps.attest_provenance.outcome == 'failure'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-name: ghcr.io/vig-os/devcontainer
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM (attempt 1)
        id: attest_sbom
        continue-on-error: true
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-name: ghcr.io/vig-os/devcontainer
          subject-digest: ${{ steps.digest.outputs.digest }}
          sbom-path: /tmp/sbom.spdx.json
          push-to-registry: true

      - name: Wait before retrying SBOM attestation
        if: steps.attest_sbom.outcome == 'failure'
        run: sleep 30

      - name: Attest SBOM (retry)
        if: steps.attest_sbom.outcome == 'failure'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        with:
          subject-name: ghcr.io/vig-os/devcontainer
          subject-digest: ${{ steps.digest.outputs.digest }}
          sbom-path: /tmp/sbom.spdx.json
          push-to-registry: true

      - name: Publish final GitHub Release
        if: needs.validate.outputs.release_kind == 'final'
        env:
          PUBLISH_VERSION: ${{ needs.validate.outputs.publish_version }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          # Draft first; promote-release.yml publishes (undrafts) after downstream verification (GitHub immutable-releases best practice).
          RETRIES=5
          LAST_ERROR=""
          for i in $(seq 1 "$RETRIES"); do
            API_OUTPUT=""
            if API_OUTPUT=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${PUBLISH_VERSION}" 2>&1); then
              IS_DRAFT=$(printf '%s' "$API_OUTPUT" | jq -r '.draft')
              if [ "$IS_DRAFT" = "true" ]; then
                echo "✓ Draft GitHub Release already exists for $PUBLISH_VERSION; skipping create (retry path)."
                echo "Publish via promote workflow when ready: just promote-release $PUBLISH_VERSION"
                exit 0
              fi
              echo "ERROR: Published (non-draft) GitHub Release already exists for tag $PUBLISH_VERSION"
              exit 1
            fi

            LAST_ERROR="$API_OUTPUT"
            if printf '%s' "$API_OUTPUT" | grep -Eqi "401|403|forbidden|bad credentials|authentication|authorization|insufficient scopes"; then
              echo "ERROR: Non-retryable authentication/authorization failure while checking for existing GitHub Release for $PUBLISH_VERSION"
              echo "$API_OUTPUT"
              exit 1
            fi

            if printf '%s' "$API_OUTPUT" | grep -Eqi "not found|HTTP 404"; then
              break
            fi

            if printf '%s' "$API_OUTPUT" | grep -Eqi "429|5[0-9]{2}|timed out|timeout|temporary|connection reset|connection refused|network|tls"; then
              if [ "$i" -lt "$RETRIES" ]; then
                BACKOFF=$((i * 5))
                echo "Release existence check failed transiently, retrying in ${BACKOFF}s ($i/$RETRIES)..."
                sleep "$BACKOFF"
              fi
              continue
            fi

            echo "ERROR: Unexpected response while checking for existing GitHub Release for $PUBLISH_VERSION"
            echo "$API_OUTPUT"
            exit 1
          done

          if ! printf '%s' "$LAST_ERROR" | grep -Eqi "not found|HTTP 404"; then
            echo "ERROR: Unable to determine whether a GitHub Release exists for $PUBLISH_VERSION after $RETRIES attempts (fail closed)."
            if [ -n "$LAST_ERROR" ]; then
              echo "Last API error:"
              echo "$LAST_ERROR"
            fi
            exit 1
          fi

          retry --retries 3 --backoff 5 --max-backoff 30 -- gh release create "$PUBLISH_VERSION" \
            --title "$PUBLISH_VERSION" \
            --notes-file /tmp/github-release-notes.md \
            --verify-tag \
            --draft || {
              RELEASE_PRESENT=0
              IS_DRAFT_RETRY=0
              rb_retries=5
              rb_last=""
              for j in $(seq 1 "$rb_retries"); do
                rb_out=""
                if rb_out=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${PUBLISH_VERSION}" 2>&1); then
                  RELEASE_PRESENT=1
                  IS_DRAFT_RETRY=$(printf '%s' "$rb_out" | jq -r '.draft')
                  break
                fi
                rb_last="$rb_out"
                if printf '%s' "$rb_out" | grep -Eqi "401|403|forbidden|bad credentials|authentication|authorization|insufficient scopes"; then
                  echo "ERROR: Non-retryable authentication/authorization failure while verifying GitHub Release after create for $PUBLISH_VERSION"
                  echo "$rb_out"
                  exit 1
                fi
                if printf '%s' "$rb_out" | grep -Eqi "not found|HTTP 404"; then
                  RELEASE_PRESENT=0
                  break
                fi
                if printf '%s' "$rb_out" | grep -Eqi "429|5[0-9]{2}|timed out|timeout|temporary|connection reset|connection refused|network|tls"; then
                  if [ "$j" -lt "$rb_retries" ]; then
                    rb_backoff=$((j * 5))
                    echo "Post-create release check failed transiently, retrying in ${rb_backoff}s ($j/$rb_retries)..."
                    sleep "$rb_backoff"
                  fi
                  continue
                fi
                echo "ERROR: Unexpected response while verifying GitHub Release after create for $PUBLISH_VERSION"
                echo "$rb_out"
                exit 1
              done
              if [ "$RELEASE_PRESENT" -eq 1 ]; then
                if [ "$IS_DRAFT_RETRY" = "true" ]; then
                  echo "✓ Draft GitHub Release present after create attempt: $PUBLISH_VERSION"
                else
                  echo "ERROR: Published (non-draft) GitHub Release appeared for $PUBLISH_VERSION during create fallback — expected draft."
                  exit 1
                fi
              else
                if [ "$j" -eq "$rb_retries" ] && ! printf '%s' "$rb_last" | grep -Eqi "not found|HTTP 404"; then
                  echo "ERROR: Unable to verify GitHub Release state for $PUBLISH_VERSION after create failure (fail closed)."
                  echo "$rb_last"
                  exit 1
                fi
                exit 1
              fi
            }

          echo "✓ Draft GitHub Release created: $PUBLISH_VERSION"
          echo "After smoke-test passes downstream, run: just promote-release $PUBLISH_VERSION (publishing locks the linked tag and assets when immutable releases are enabled)"

      - name: Summary
        env:
          BASE_VERSION: ${{ needs.validate.outputs.version }}
          PUBLISH_VERSION: ${{ needs.validate.outputs.publish_version }}
          RELEASE_KIND: ${{ needs.validate.outputs.release_kind }}
        run: |
          echo "✓ Release published successfully!"
          echo ""
          echo "Release Summary:"
          echo "  Base Version: $BASE_VERSION"
          echo "  Release Kind: $RELEASE_KIND"
          echo "  Tag: $PUBLISH_VERSION"
          echo "  Images:"
          echo "    - ghcr.io/vig-os/devcontainer:$PUBLISH_VERSION"
          if [ "$RELEASE_KIND" = "final" ]; then
            echo "    - ghcr.io/vig-os/devcontainer:latest (after just promote-release $BASE_VERSION)"
          fi
          echo "  Security:"
          echo "    - Cosign signature attached"
          echo "    - SLSA build provenance attested"
          echo "    - SBOM (SPDX) generated and attested"
          echo ""
          echo "Next steps:"
          if [ "$RELEASE_KIND" = "candidate" ]; then
            echo "  1. Smoke-test dispatch runs in the smoke-test job."
            echo "  2. If downstream pre-release passes, run: just finalize-release $BASE_VERSION"
          else
            echo "  1. Smoke-test dispatch runs in the smoke-test job; wait for downstream final release on devcontainer-smoke-test."
            echo "  2. Run: just promote-release $BASE_VERSION — updates :latest, publishes the draft GitHub Release, merges the release PR to main."
          fi

  smoke-test:
    name: Smoke-Test Dispatch
    needs: [validate, finalize, publish]
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    if: ${{ github.event.inputs.dry-run != 'true' }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Generate smoke-test dispatch token
        id: smoke-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: vig-os
          repositories: devcontainer-smoke-test

      # Local actions from ./.github/actions/* require repository checkout in this job workspace.
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Trigger smoke-test repository dispatch
        env:
          GH_TOKEN: ${{ steps.smoke-app-token.outputs.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.publish_version }}
          RELEASE_KIND: ${{ needs.validate.outputs.release_kind }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_WORKFLOW: ${{ github.workflow }}
          SOURCE_RUN_ID: ${{ github.run_id }}
          SOURCE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SOURCE_SHA: ${{ needs.finalize.outputs.finalize_sha }}
          CORRELATION_ID: ${{ github.repository }}:${{ github.run_id }}:${{ needs.validate.outputs.publish_version }}
        run: |
          set -euo pipefail
          retry --retries 3 --backoff 10 --max-backoff 10 -- \
            gh api repos/vig-os/devcontainer-smoke-test/dispatches \
              -f event_type=smoke-test-trigger \
              -f "client_payload[tag]=$RELEASE_TAG" \
              -f "client_payload[release_kind]=$RELEASE_KIND" \
              -f "client_payload[event_type]=smoke-test-trigger" \
              -f "client_payload[source_repo]=$SOURCE_REPO" \
              -f "client_payload[source_workflow]=$SOURCE_WORKFLOW" \
              -f "client_payload[source_run_id]=$SOURCE_RUN_ID" \
              -f "client_payload[source_run_url]=$SOURCE_RUN_URL" \
              -f "client_payload[source_sha]=$SOURCE_SHA" \
              -f "client_payload[correlation_id]=$CORRELATION_ID"
          echo "✓ Triggered smoke-test dispatch for release tag: $RELEASE_TAG"

      - name: Summary
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.publish_version }}
          RELEASE_KIND: ${{ needs.validate.outputs.release_kind }}
        run: |
          echo "✓ Triggered smoke-test dispatch for release tag: $RELEASE_TAG"
          echo "Downstream validation is asynchronous; verify in devcontainer-smoke-test."
          if [ "$RELEASE_KIND" = "final" ]; then
            echo "Final: when downstream smoke-test has published its release for this tag, run: just promote-release $RELEASE_TAG"
          fi

      - name: Create issue for smoke dispatch failure
        if: ${{ failure() }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const publishVersion = '${{ needs.validate.outputs.publish_version }}';
            const releaseKind = '${{ needs.validate.outputs.release_kind }}';
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const title = `Release ${publishVersion} smoke dispatch failed`;
            const body = `
            Release ${publishVersion} (${releaseKind}) failed while triggering downstream smoke-test dispatch.

            **Workflow Run:** [View logs](${workflowUrl})
            **Failed Job:** smoke-test

            **Important:**
            - Upstream publish already completed before this dispatch step.
            - Published artifacts (GHCR images, tag, signatures, attestations, and draft or published GitHub Release if applicable) are intentionally left intact.
            - No branch reset or tag deletion is performed for dispatch-only failures.

            **Next Steps:**
            1. Review smoke-test dispatch logs in this workflow run.
            2. Validate token/repository_dispatch permissions for \`vig-os/devcontainer-smoke-test\`.
            3. Re-trigger dispatch after fixing the root cause.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'area:ci']
            });

            core.info(`Created issue: ${title}`);

  rollback:
    name: Rollback on Failure
    # Rollback is intentionally scoped to pre-publish/publish failures.
    # Dispatch-only smoke-test failures happen after publish; automation does not delete tags or reset branches (forward-fix policy).
    needs: [validate, finalize, build-and-test, vulnix-gate, publish]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # A cancelled required job is treated as not-green (same as failure): roll back rather than leave a partial release.
    if: ${{ always() && (contains(fromJSON('["failure", "cancelled"]'), needs.validate.result) || contains(fromJSON('["failure", "cancelled"]'), needs.finalize.result) || contains(fromJSON('["failure", "cancelled"]'), needs.build-and-test.result) || contains(fromJSON('["failure", "cancelled"]'), needs.vulnix-gate.result) || contains(fromJSON('["failure", "cancelled"]'), needs.publish.result)) }}
    permissions:
      contents: read        # required by actions/checkout in rollback job
      issues: write          # create failure issue
      # Git Data API rollback (commit + ref) uses COMMIT_APP (same as finalize) so protected
      # release/* updates are allowed. Failure issues use the default GITHUB_TOKEN (issues: write).

    steps:
      - name: Generate Commit App Token
        id: commit-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          client-id: ${{ secrets.COMMIT_APP_CLIENT_ID }}
          private-key: ${{ secrets.COMMIT_APP_PRIVATE_KEY }}

      - name: Generate Release App Token
        id: release-app-token
        if: ${{ needs.validate.outputs.release_kind == 'final' && needs.validate.outputs.pr_number != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Rollback release branch
        id: rollback-branch
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.commit-app-token.outputs.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          PRE_SHA: ${{ needs.validate.outputs.pre_finalize_sha }}
        run: |
          set -euo pipefail
          echo "Rolling back release branch to pre-finalization state..."
          REPO="${{ github.repository }}"
          BRANCH_REF="heads/release/$VERSION"

          TREE_SHA=$(retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh api "repos/$REPO/git/commits/$PRE_SHA" --jq '.tree.sha')
          CURRENT_SHA=$(retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh api "repos/$REPO/git/refs/$BRANCH_REF" --jq '.object.sha')

          if [ "$CURRENT_SHA" = "$PRE_SHA" ]; then
            echo "Branch already at pre-finalization SHA, no rollback needed"
            exit 0
          fi

          REVERT_SHA=$(retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh api -X POST "repos/$REPO/git/commits" \
              -f message="revert: undo finalize release $VERSION (workflow rollback)" \
              -f tree="$TREE_SHA" \
              -f "parents[]=$CURRENT_SHA" \
              --jq '.sha')

          retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh api "repos/$REPO/git/refs/$BRANCH_REF" \
              -X PATCH \
              -f sha="$REVERT_SHA"
          echo "✓ Release branch rolled back via revert commit $REVERT_SHA (tree at $PRE_SHA)"

      - name: Restore release PR body from pre-finalization CHANGELOG
        id: restore-pr-body
        if: ${{ needs.validate.outputs.release_kind == 'final' && needs.validate.outputs.pr_number != '' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          PRE_SHA: ${{ needs.validate.outputs.pre_finalize_sha }}
          PR_NUMBER: ${{ needs.validate.outputs.pr_number }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          echo "Restoring release PR #$PR_NUMBER body from CHANGELOG at pre-finalization SHA..."

          retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh api "repos/$REPO/contents/CHANGELOG.md?ref=$PRE_SHA" --jq '.content' | tr -d '\n' | base64 -d > /tmp/changelog-pre.md

          CHANGELOG_CONTENT=$(awk -v hdr="## [${VERSION}]" '
            index($0, hdr) == 1 { p = 1; print; next }
            p && /^## \[/ { exit }
            p { print }
          ' /tmp/changelog-pre.md)

          if [ -z "$CHANGELOG_CONTENT" ]; then
            echo "ERROR: Could not extract release section for version $VERSION from CHANGELOG at $PRE_SHA"
            exit 1
          fi

          # GitHub caps PR bodies at 65536 chars; a large release changelog
          # can overflow it (#810). Truncate at a line boundary and point to
          # the full CHANGELOG.md on the release branch when it does.
          MAX_BODY=65000
          RELEASE_BRANCH="release/$VERSION"
          HEADER="# Release $VERSION

          This PR prepares release $VERSION for merge to main.

          "
          PR_BODY="${HEADER}${CHANGELOG_CONTENT}"$'\n'

          if [ "${#PR_BODY}" -gt "$MAX_BODY" ]; then
            NOTE=$(printf '\n\n_Changelog truncated to fit GitHub'"'"'s %s-char PR-body limit; see `CHANGELOG.md` on `%s` for the full entry._' "$MAX_BODY" "$RELEASE_BRANCH")
            budget=$(( MAX_BODY - ${#HEADER} - ${#NOTE} ))
            TRUNCATED="${CHANGELOG_CONTENT:0:budget}"
            TRUNCATED="${TRUNCATED%$'\n'*}"
            PR_BODY="${HEADER}${TRUNCATED}${NOTE}"
          fi

          printf '%s' "$PR_BODY" > /tmp/release-pr-body.md

          retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh pr edit "$PR_NUMBER" --body-file /tmp/release-pr-body.md
          echo "✓ Restored PR #$PR_NUMBER body to prepare-release format (TBD)"

      - name: Create failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const publishVersion = '${{ needs.validate.outputs.publish_version }}';
            const workflowUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const prNumber = ${{ needs.validate.outputs.pr_number || 'null' }};

            let failedJobs = [];
            if ('${{ needs.validate.result }}' !== 'success') failedJobs.push('validate');
            if ('${{ needs.finalize.result }}' !== 'success') failedJobs.push('finalize');
            if ('${{ needs.build-and-test.result }}' !== 'success') failedJobs.push('build-and-test');
            if ('${{ needs.vulnix-gate.result }}' !== 'success') failedJobs.push('vulnix-gate');
            if ('${{ needs.publish.result }}' !== 'success') failedJobs.push('publish');

            const rollbackBranch = '${{ steps.rollback-branch.outcome }}';
            const prBodyRestore = '${{ steps.restore-pr-body.outcome }}';

            const title = `Release ${publishVersion} failed -- automatic rollback`;
            const body = `
            Release ${publishVersion} encountered an error during the automated release workflow.

            **Failed Jobs:** ${failedJobs.join(', ')}

            **Workflow Run:** [View logs](${workflowUrl})

            **Release PR:** #${prNumber}

            **Rollback Results:**
            - Branch rollback: ${rollbackBranch}
            - PR body restoration: ${prBodyRestore}

            **Tag status (forward-fix policy):**
            - Release tags are **not** deleted by automation (workflow choice; not the same as GitHub immutable-release lock-in).
            - If the tag was pushed before the failure, it remains on the remote; use a new release candidate to validate fixes, then re-run the final release when ready.

            **Actions Taken:**
            - Release branch reset to pre-finalization state (best-effort)
            - Release PR body restored to TBD / prepare-release format when applicable (best-effort)
            - This issue created for investigation

            **Manual Cleanup May Be Needed:**
            - If images were pushed to GHCR before the failure, they are **not** automatically deleted. Check \`ghcr.io/vig-os/devcontainer:${publishVersion}-*\` and remove any orphaned images manually.
            - If a **draft** GitHub Release exists for this tag, edit or manage it from the Releases UI (**publishing** locks the linked tag and assets when **immutable releases** are enabled).

            **Next Steps:**
            1. Review the workflow logs to identify the root cause
            2. Check rollback results above; fix any partial rollback manually
            3. Fix the issue on the release branch
            4. Publish a new release candidate to validate the fix; re-run the final workflow when ready

            For details, check the workflow run linked above.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'area:ci']
            });

            console.log(`Created issue: ${title}`);

      - name: Summary
        run: |
          echo "✗ Release workflow failed"
          echo ""
          echo "Automatic rollback completed:"
          echo "  - Release branch reset to pre-finalization state (best-effort)"
          echo "  - Release PR body restoration: ${{ steps.restore-pr-body.outcome }} (skipped if not a final release or no PR number)"
          echo "  - Tags were not deleted (forward-fix policy)"
          echo "  - GitHub issue created for investigation"
          echo ""
          echo "Check the workflow logs and issue for details"
