# Scheduled Security Scan
#
# Nightly CVE scan of the Nix-built devcontainer image. vulnix (nixpkgs-native)
# is the primary scanner — the image has no apt/dpkg DB — gated by `vulnix-gate`
# against the `.vulnixignore` exception register; Trivy emits a CycloneDX SBOM +
# an SBOM-mode view for defence in depth. (The Debian `:latest` Trivy job was
# removed with the Debian path in #642.)
#
# Triggers:
#   - Nightly schedule: 05:00 UTC
#   - Manual dispatch (e.g. a pre-release run on dev — scheduled runs execute
#     from the default branch, so this workflow never runs on dev otherwise)
#
# Jobs:
#   1. scan-nix-image - build the image closure, run vulnix (+ Trivy SBOM)
#
# Artifacts:
#   - vulnix findings (JSON + table) and a CycloneDX SBOM (uploaded)

name: Scheduled Security Scan

on:  # yamllint disable-line rule:truthy
  schedule:
    # Nightly (staggered after nightly CI at 04:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # vulnix CVE scan of the Nix-built image (T3.1, #637).
  #
  # A Nix image has no apt/dpkg DB, so Trivy's OS-package scanner goes dark.
  # vulnix (nixpkgs-native) becomes the PRIMARY CVE signal here, scanning the
  # image's package closure (flake `devcontainerImageEnv`); Trivy stays on for a
  # CycloneDX SBOM + an SBOM-mode vuln view (defense in depth). The vulnix-gate
  # step is BLOCKING (#639): the nixpkgs baseline was advanced to 26.05 and the
  # residual findings triaged into .vulnixignore (see docs/security/
  # nix-cutover-scan-overlap.md), so any new unexcepted HIGH/CRITICAL fails the
  # scan. SARIF upload to the Security tab + a deduplicated issue can be added
  # alongside the actual publish-cutover.
  scan-nix-image:
    name: Scan Nix image (vulnix + SBOM)
    runs-on: ubuntu-24.04
    # Worst case is a cold NVD cache week plus retries against a throttled
    # nvd.nist.gov (~25 min per attempt); warm-cache runs finish in minutes.
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up environment (Nix + flake toolchain for the gate utilities)
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate .vulnixignore exception expirations
        run: uv run check-expirations .vulnixignore

      # Weekly-keyed cache of vulnix's NVD database (~/.cache/vulnix). vulnix's
      # freshness logic makes this cheap: a cache < 7 days old means only the
      # ~3 MB `modified` feed is fetched; without it every run cold-fetches
      # ~122 MB of year feeds from nvd.nist.gov, which is heavily throttled
      # and currently unstable (nix-community/vulnix#171).
      - name: Compute NVD cache key (ISO week)
        id: nvd-week
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache the vulnix NVD database
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/vulnix
          key: vulnix-nvd-${{ steps.nvd-week.outputs.week }}
          restore-keys: |
            vulnix-nvd-

      - name: Build the vulnix scan target (image package closure)
        run: |
          set -euo pipefail
          nix build .#devcontainerImageEnv --print-build-logs

      - name: Run vulnix (primary CVE scanner)
        # NOTE: no blanket `|| true`. vulnix exit codes: 0 = clean, 1 = only
        # whitelisted (needs -s), 2 = reportable advisories found (the gate, not
        # the scan, decides pass/fail). Any code > 2 (e.g. 3 usage error, 127
        # not-found, 137 OOM-kill) means the scan itself failed — fail the job
        # instead of masking the crash as an empty, clean-looking result.
        # The runner's default shell is `bash -e {0}`, so a bare vulnix call dies
        # on exit 2 before the tolerant rc check runs — capture the status via
        # `|| rc=$?` (errexit-safe) instead of a follow-up `rc=$?`.
        #
        # The first invocation triggers the NVD update, whose feed downloads
        # time out when nvd.nist.gov is throttled (vulnix has no retry and
        # crashes with exit 1 — indistinguishable from its documented
        # "only whitelisted findings" exit 1). Retry with backoff and treat a
        # run as successful only if the findings file is valid JSON; per-feed
        # ETag caching means retries resume rather than restart. The second
        # (table) invocation then runs against a < 2 h-old DB and fetches
        # nothing.
        run: |
          set -uo pipefail
          rc=0
          for attempt in 1 2 3; do
            rc=0
            nix run .#vulnix -- --closure ./result --json > vulnix-findings.json || rc=$?
            [ "$rc" -le 2 ] && jq -e . vulnix-findings.json > /dev/null 2>&1 && break
            echo "::warning::vulnix scan attempt ${attempt} failed (exit ${rc}); retrying in $((60 * attempt))s"
            sleep $((60 * attempt))
          done
          [ "$rc" -le 2 ] && jq -e . vulnix-findings.json > /dev/null 2>&1 \
            || { echo "::error::vulnix scan failed after 3 attempts (exit $rc)"; exit 1; }
          rc=0
          nix run .#vulnix -- --closure ./result | tee vulnix-report.txt || rc=$?
          [ "$rc" -le 2 ] || { echo "::error::vulnix report failed (exit $rc)"; exit "$rc"; }

      - name: Gate on unexcepted HIGH/CRITICAL vulnix findings
        id: vulnix-gate
        # BLOCKING (#639): fails the nightly scan on any HIGH/CRITICAL not covered
        # by a non-expired entry in .vulnixignore. This is the go/no-go gate for
        # the publish-cutover.
        run: uv run vulnix-gate vulnix-findings.json --register .vulnixignore

      - name: Build the Nix image for SBOM generation
        run: |
          set -euo pipefail
          nix build .#devcontainerImage --print-build-logs
          cp -L result /tmp/nix-image.tar.gz

      - name: Generate Nix image SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          version: 'v0.71.2'
          input: /tmp/nix-image.tar.gz
          format: 'cyclonedx'
          output: 'sbom-nix-cyclonedx.json'

      - name: Trivy SBOM-mode scan (defense in depth, awareness only)
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          version: 'v0.71.2'
          scan-type: 'sbom'
          scan-ref: 'sbom-nix-cyclonedx.json'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload vulnix findings + SBOM (Trivy-vs-vulnix overlap evidence)
        # always(): a red vulnix-gate is exactly when the findings are needed
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: nix-image-cve-scan
          path: |
            vulnix-findings.json
            vulnix-report.txt
            sbom-nix-cyclonedx.json
          retention-days: 90

      - name: Write Nix image scan summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Nix image CVE scan (vulnix + SBOM)"
            echo ""
            echo "- **Scan target:** flake \`devcontainerImageEnv\` (image package closure)"
            echo "- **Primary scanner:** vulnix (nixpkgs-native)"
            echo "- **Date (UTC):** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "- **Gate:** ${{ steps.vulnix-gate.outcome }} (blocking: fails on unexcepted HIGH/CRITICAL findings)"
            echo ""
            echo "vulnix over-reports CVEs already patched in nixpkgs; triage findings"
            echo "into \`.vulnixignore\` and advance the nixpkgs rev before #639."
          } >> "$GITHUB_STEP_SUMMARY"
