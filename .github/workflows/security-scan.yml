# Scheduled Security Scan
#
# Nightly scan of the latest published container image from GHCR (covers main via
# :latest) without rebuilding. This scan (category: container-image-latest) is the
# single source of truth for the GitHub Security tab. Pull requests to
# dev/release/main run full CI (ci.yml), where Trivy acts as a blocking GATE only
# (fail on fixable HIGH/CRITICAL) and does NOT upload SARIF to the Security tab.
#
# Triggers:
#   - Nightly schedule: 05:00 UTC
#
# Jobs:
#   1. scan-latest - Pull ghcr.io/vig-os/devcontainer:latest and Trivy + SBOM + SARIF
#
# When fixable HIGH/CRITICAL vulnerabilities are found (after .trivyignore):
#   - Workflow fails (GitHub notifies watchers)
#   - One open issue with label security-scan is created (deduplicated)
#   - Step summary records verdict and links
#
# Artifacts:
#   - SBOM (CycloneDX) with all packages
#   - SARIF report uploaded to GitHub Security tab (category: container-image-latest)

name: Scheduled Security Scan

on:  # yamllint disable-line rule:truthy
  schedule:
    # Nightly (staggered after nightly CI at 04:00 UTC)
    - cron: '0 5 * * *'

permissions:
  contents: read

jobs:
  scan-latest:
    name: Scan GHCR Latest Image
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write               # create deduplicated security-scan issue on gate failure
      security-events: write    # upload SARIF results to GitHub Security tab

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'

      - name: Validate .trivyignore exception expirations
        run: uv run check-expirations .trivyignore

      - name: Pull latest image and save as tar
        id: pull
        continue-on-error: true
        run: |
          set -euo pipefail
          IMAGE=ghcr.io/vig-os/devcontainer:latest
          docker pull "$IMAGE"
          docker save "$IMAGE" -o /tmp/image-latest.tar
          RESOLVED=$(docker inspect --format '{{range .RepoDigests}}{{.}}{{"\n"}}{{end}}' "$IMAGE" | head -n1 | tr -d '\n')
          if [ -z "$RESOLVED" ] || [ "$RESOLVED" = '<no value>' ]; then
            RESOLVED=$(docker inspect --format='{{.Id}}' "$IMAGE")
          fi
          echo "image_ref=${RESOLVED}" >> "$GITHUB_OUTPUT"

      - name: Log when latest image is unavailable
        if: steps.pull.outcome != 'success'
        run: |
          echo "::error::Scan skipped: GHCR devcontainer:latest pull failed"
          exit 1

      - name: Scan latest image for all vulnerabilities
        if: steps.pull.outcome == 'success'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          version: 'v0.71.2'
          input: /tmp/image-latest.tar
          format: 'table'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          exit-code: '0'  # Non-blocking: for awareness only
          trivyignores: '.trivyignore'

      - name: Gate on fixable HIGH/CRITICAL vulnerabilities
        id: gate
        if: steps.pull.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          version: 'v0.71.2'
          input: /tmp/image-latest.tar
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      - name: Generate latest image SBOM (CycloneDX)
        if: steps.pull.outcome == 'success'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          version: 'v0.71.2'
          input: /tmp/image-latest.tar
          format: 'cyclonedx'
          output: 'sbom-latest-cyclonedx.json'

      - name: Generate latest image SARIF report
        if: steps.pull.outcome == 'success'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          version: 'v0.71.2'
          input: /tmp/image-latest.tar
          format: 'sarif'
          output: 'trivy-latest-results.sarif'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          trivyignores: '.trivyignore'

      - name: Upload latest SBOM artifact
        if: steps.pull.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-latest
          path: sbom-latest-cyclonedx.json
          retention-days: 90

      - name: Upload latest SARIF to GitHub Security
        if: steps.pull.outcome == 'success'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          sarif_file: trivy-latest-results.sarif
          category: 'container-image-latest'

      - name: Write scan summary
        if: steps.pull.outcome == 'success'
        env:
          IMAGE_REF: ${{ steps.pull.outputs.image_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SECURITY_URL: ${{ github.server_url }}/${{ github.repository }}/security
        run: |
          set -euo pipefail
          {
            echo "## Scheduled security scan (:latest)"
            echo ""
            echo "- **Image (resolved):** \`${IMAGE_REF}\`"
            echo "- **Tag pulled:** \`ghcr.io/vig-os/devcontainer:latest\`"
            echo "- **Date (UTC):** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "- **Workflow run:** [${{ github.run_id }}](${RUN_URL})"
            echo ""
            if [ "${{ steps.gate.outcome }}" = "failure" ]; then
              echo "### Result"
              echo ""
              echo "**Fixable HIGH/CRITICAL vulnerabilities detected** (see Trivy table in job logs and [Security](${SECURITY_URL}))."
            else
              echo "### Result"
              echo ""
              echo "No fixable HIGH/CRITICAL vulnerabilities passed the gate (after \`.trivyignore\`)."
            fi
            echo ""
            echo "Full dependency results: [Code security](${SECURITY_URL})."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub issue on gate failure
        if: steps.pull.outcome == 'success' && steps.gate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_REF: ${{ steps.pull.outputs.image_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SECURITY_URL: ${{ github.server_url }}/${{ github.repository }}/security
        run: |
          set -euo pipefail
          gh label create security-scan \
            --description 'Automated nightly security scan findings for :latest image' \
            --color BFD4F2 2>/dev/null || true
          EXISTING=$(gh issue list --label security-scan --state open --limit 1 --json number -q '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Open security-scan issue already exists: #$EXISTING -- skipping create"
            exit 0
          fi
          BODY="$(cat <<EOF
          Nightly scan found **fixable HIGH/CRITICAL** vulnerabilities in the resolved image below (after \`.trivyignore\`).

          - **Image (resolved):** \`${IMAGE_REF}\`
          - **Tag pulled:** \`ghcr.io/vig-os/devcontainer:latest\`
          - **Scan date (UTC):** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          - **Workflow run:** ${RUN_URL}
          - **Security tab:** ${SECURITY_URL}

          Close this issue after the image is remediated and the next scheduled run passes the gate.
          EOF
          )"
          gh issue create \
            --title "Nightly security scan: HIGH/CRITICAL vulnerabilities in :latest" \
            --label security-scan --label security \
            --body "$BODY"

      - name: Fail if fixable HIGH/CRITICAL vulnerabilities found
        if: steps.pull.outcome == 'success' && steps.gate.outcome == 'failure'
        env:
          IMAGE_REF: ${{ steps.pull.outputs.image_ref }}
        run: |
          echo "::error::Fixable HIGH/CRITICAL vulnerabilities detected in ${IMAGE_REF} (pulled as ghcr.io/vig-os/devcontainer:latest)"
          exit 1

  # vulnix CVE scan of the Nix-built image (T3.1, #637).
  #
  # A Nix image has no apt/dpkg DB, so Trivy's OS-package scanner goes dark.
  # vulnix (nixpkgs-native) becomes the PRIMARY CVE signal here, scanning the
  # image's package closure (flake `devcontainerImageEnv`); Trivy stays on for a
  # CycloneDX SBOM + an SBOM-mode vuln view (defense in depth). The vulnix-gate
  # step is NON-BLOCKING for now (discovery): vulnix over-reports because it does
  # not see nixpkgs' backported patches, so findings are triaged into
  # .vulnixignore (and the nixpkgs rev advanced) before #639 flips this gate to
  # blocking and wires SARIF upload + a deduplicated issue, like scan-latest.
  scan-nix-image:
    name: Scan Nix image (vulnix + SBOM)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Nix (upstream CppNix)
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3  # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Configure Cachix (pull-only substituter)
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71  # v17
        with:
          name: ${{ vars.CACHIX_CACHE }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Set up environment (uv for the gate utilities)
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'

      - name: Validate .vulnixignore exception expirations
        run: uv run check-expirations .vulnixignore

      - name: Build the vulnix scan target (image package closure)
        run: |
          set -euo pipefail
          nix build .#devcontainerImageEnv --print-build-logs

      - name: Run vulnix (primary CVE scanner)
        run: |
          set -euo pipefail
          # vulnix exits non-zero when advisories are found; the gate decides
          # pass/fail, so don't let the scan itself fail the step.
          nix run .#vulnix -- --closure ./result --json > vulnix-findings.json || true
          nix run .#vulnix -- --closure ./result | tee vulnix-report.txt || true

      - name: Gate on unexcepted HIGH/CRITICAL vulnix findings
        id: vulnix-gate
        # Discovery phase: non-blocking. #639 removes continue-on-error to make
        # this the publish-cutover gate.
        continue-on-error: true
        run: uv run vulnix-gate vulnix-findings.json --register .vulnixignore

      - name: Build the Nix image for SBOM generation
        run: |
          set -euo pipefail
          nix build .#devcontainerImage --print-build-logs
          cp -L result /tmp/nix-image.tar.gz

      - name: Generate Nix image SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          version: 'v0.71.2'
          input: /tmp/nix-image.tar.gz
          format: 'cyclonedx'
          output: 'sbom-nix-cyclonedx.json'

      - name: Trivy SBOM-mode scan (defense in depth, awareness only)
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          version: 'v0.71.2'
          scan-type: 'sbom'
          scan-ref: 'sbom-nix-cyclonedx.json'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload vulnix findings + SBOM (Trivy-vs-vulnix overlap evidence)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: nix-image-cve-scan
          path: |
            vulnix-findings.json
            vulnix-report.txt
            sbom-nix-cyclonedx.json
          retention-days: 90

      - name: Write Nix image scan summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Nix image CVE scan (vulnix + SBOM)"
            echo ""
            echo "- **Scan target:** flake \`devcontainerImageEnv\` (image package closure)"
            echo "- **Primary scanner:** vulnix (nixpkgs-native)"
            echo "- **Date (UTC):** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "- **Gate:** ${{ steps.vulnix-gate.outcome }} (non-blocking during discovery; blocking at #639)"
            echo ""
            echo "vulnix over-reports CVEs already patched in nixpkgs; triage findings"
            echo "into \`.vulnixignore\` and advance the nixpkgs rev before #639."
          } >> "$GITHUB_STEP_SUMMARY"
