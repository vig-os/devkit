# Promote Release — after publish (finalize) workflow
#
# Run after release.yml (final) has produced versioned GHCR images, draft GitHub Release,
# and downstream smoke-test has published a non-draft, non-prerelease release for the same tag.
#
# 1. validate: GHCR X.Y.Z + cosign, draft release on this repo, downstream final release
# 2. promote: GHCR :latest manifest, publish (undraft) GitHub Release
# 3. merge: merge release/X.Y.Z PR to main (triggers sync-main-to-dev)
# 4. cleanup (best-effort): delete GHCR RC images and matching RC cosign signatures for this
#    base version; delete RC draft pre-releases, then matching git RC tags that have no
#    (remaining) GitHub Release. GHCR deletes use
#    GITHUB_TOKEN with repo Admin on the package (Manage Actions access); git RC tag deletes
#    still use RELEASE_APP. Cleanup step fails loudly on leftover RC tags; job uses
#    continue-on-error so promote still completes. See docs/RELEASE_CYCLE.md.

name: Promote Release

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to promote (e.g., 1.2.3)'
        required: true
        type: string
      architectures:
        description: 'Architectures that were published (comma-separated: amd64,arm64)'
        required: false
        default: 'amd64,arm64'
        type: string

concurrency:
  group: publish-image
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate promote prerequisites
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      packages: read
    outputs:
      version: ${{ steps.vars.outputs.version }}
      architectures: ${{ steps.vars.outputs.architectures }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate version and architectures
        id: vars
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_ARCHITECTURES: ${{ github.event.inputs.architectures }}
        run: |
          set -euo pipefail
          VERSION="$INPUT_VERSION"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version format '$VERSION'"
            echo "Version must follow semantic versioning: MAJOR.MINOR.PATCH (e.g., 1.2.3)"
            exit 1
          fi

          ARCHS=$(echo "$INPUT_ARCHITECTURES" | tr -d ' ')
          IFS=',' read -ra ARCH_ARRAY <<< "$ARCHS"
          VALID_ARCHS="amd64 arm64"
          VALIDATED_ARCHS=()
          for arch in "${ARCH_ARRAY[@]}"; do
            [ -z "$arch" ] && continue
            if [[ " $VALID_ARCHS " =~ " $arch " ]]; then
              VALIDATED_ARCHS+=("$arch")
            else
              echo "ERROR: Invalid architecture '$arch'"
              exit 1
            fi
          done
          UNIQUE_ARCHS=($(echo "${VALIDATED_ARCHS[@]}" | tr ' ' '\n' | sort -u))
          if [ ${#UNIQUE_ARCHS[@]} -ne ${#VALIDATED_ARCHS[@]} ]; then
            echo "ERROR: Duplicate architectures found"
            exit 1
          fi
          if [ ${#VALIDATED_ARCHS[@]} -ne 2 ]; then
            echo "ERROR: Promoting :latest requires exactly two architectures (got ${#VALIDATED_ARCHS[@]})"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "architectures=${VALIDATED_ARCHS[*]}" >> "$GITHUB_OUTPUT"
          echo "✓ Version=$VERSION architectures=${VALIDATED_ARCHS[*]}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Verify GHCR images and version manifest
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          ARCHS: ${{ steps.vars.outputs.architectures }}
        run: |
          set -euo pipefail
          REPO="ghcr.io/vig-os/devkit"
          IFS=' ' read -ra ARCH_ARRAY <<< "$ARCHS"
          for arch in "${ARCH_ARRAY[@]}"; do
            echo "Verifying image: $REPO:$VERSION-$arch"
            if ! docker buildx imagetools inspect "$REPO:$VERSION-$arch" >/dev/null 2>&1; then
              echo "ERROR: Missing image $REPO:$VERSION-$arch"
              exit 1
            fi
          done
          echo "Verifying version manifest: $REPO:$VERSION"
          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            if docker buildx imagetools inspect "$REPO:$VERSION" >/dev/null 2>&1; then
              echo "✓ Version manifest present"
              break
            fi
            if [ "$i" -lt "$RETRIES" ]; then
              echo "Retry $i/$RETRIES..."
              sleep 5
            else
              echo "ERROR: Version manifest not found: $REPO:$VERSION"
              exit 1
            fi
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4

      - name: Verify cosign signature
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          REPO="ghcr.io/vig-os/devkit"
          retry --retries 3 --backoff 10 --max-backoff 30 -- \
            cosign verify "$REPO:$VERSION" \
              --certificate-identity-regexp='https://github.com/vig-os/devcontainer/.github/workflows/release.yml@refs/heads/release/' \
              --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
          echo "✓ Cosign verification passed for $REPO:$VERSION"

      - name: Verify draft GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          RETRIES=5
          LAST_ERROR=""
          RELEASE_JSON=""
          for i in $(seq 1 "$RETRIES"); do
            API_OUTPUT=""
            if API_OUTPUT=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate 2>&1); then
              MATCHED=$(printf '%s' "$API_OUTPUT" | \
                jq -s --arg tag "$VERSION" 'flatten | map(select(.tag_name == $tag)) | .[0] // empty' 2>/dev/null)
              if printf '%s' "$MATCHED" | jq -e 'type == "object"' >/dev/null 2>&1; then
                RELEASE_JSON="$MATCHED"
                break
              fi
              LAST_ERROR="No release found for tag $VERSION (not in releases list yet)"
              if [ "$i" -lt "$RETRIES" ]; then
                sleep $((i * 5))
                continue
              fi
              break
            fi
            LAST_ERROR="$API_OUTPUT"
            if printf '%s' "$API_OUTPUT" | grep -Eqi "401|403|forbidden|bad credentials"; then
              echo "$API_OUTPUT"
              exit 1
            fi
            if printf '%s' "$API_OUTPUT" | grep -Eqi "404|not found"; then
              if [ "$i" -lt "$RETRIES" ]; then
                sleep $((i * 5))
                continue
              fi
              break
            fi
            if printf '%s' "$API_OUTPUT" | grep -Eqi "429|5[0-9]{2}"; then
              if [ "$i" -lt "$RETRIES" ]; then
                sleep $((i * 5))
                continue
              fi
            fi
            echo "ERROR: Unexpected response querying release for tag $VERSION"
            echo "$API_OUTPUT"
            exit 1
          done
          if [ -z "$RELEASE_JSON" ]; then
            echo "ERROR: No GitHub Release for tag $VERSION"
            if [ -n "$LAST_ERROR" ]; then
              echo "$LAST_ERROR"
            fi
            exit 1
          fi
          IS_DRAFT=$(printf '%s' "$RELEASE_JSON" | jq -r '.draft')
          if [ "$IS_DRAFT" != "true" ]; then
            echo "ERROR: GitHub Release for $VERSION must still be a draft (got draft=$IS_DRAFT)"
            exit 1
          fi
          echo "✓ Draft GitHub Release exists for $VERSION"

      - name: Generate cross-repo token for downstream gate
        id: smoke-check-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: vig-os
          repositories: devkit-smoke-test

      - name: Verify downstream published final release
        env:
          GH_TOKEN: ${{ steps.smoke-check-token.outputs.token }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          echo "Checking downstream release for tag $VERSION..."
          RETRIES=5
          RELEASE_JSON=""
          LAST_ERROR=""
          for i in $(seq 1 "$RETRIES"); do
            API_OUTPUT=""
            if API_OUTPUT=$(gh api "repos/vig-os/devkit-smoke-test/releases/tags/$VERSION" 2>&1); then
              RELEASE_JSON="$API_OUTPUT"
              break
            fi
            LAST_ERROR="$API_OUTPUT"
            if printf '%s' "$API_OUTPUT" | grep -Eqi "401|403|forbidden|bad credentials"; then
              echo "$API_OUTPUT"
              exit 1
            fi
            if printf '%s' "$API_OUTPUT" | grep -Eqi "404|not found"; then
              if [ "$i" -lt "$RETRIES" ]; then
                echo "Downstream release not ready, retry $i/$RETRIES..."
                sleep $((i * 10))
                continue
              fi
              break
            fi
            if printf '%s' "$API_OUTPUT" | grep -Eqi "429|5[0-9]{2}"; then
              if [ "$i" -lt "$RETRIES" ]; then
                echo "Downstream API transient error, retry $i/$RETRIES..."
                sleep $((i * 10))
                continue
              fi
            fi
            echo "ERROR: Failed querying downstream release API for $VERSION"
            echo "$API_OUTPUT"
            exit 1
          done
          if [ -z "$RELEASE_JSON" ]; then
            echo "ERROR: No downstream release for tag $VERSION on devkit-smoke-test"
            if [ -n "$LAST_ERROR" ]; then
              echo "$LAST_ERROR"
            fi
            echo "Wait for the smoke-test workflow to publish its final release, then retry."
            exit 1
          fi
          IS_DRAFT=$(printf '%s' "$RELEASE_JSON" | jq -r '.draft')
          IS_PRERELEASE=$(printf '%s' "$RELEASE_JSON" | jq -r '.prerelease')
          if [ "$IS_DRAFT" = "true" ]; then
            echo "ERROR: Downstream release for $VERSION is still a draft"
            exit 1
          fi
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "ERROR: Downstream release for $VERSION is still a pre-release (expected final)"
            exit 1
          fi
          echo "✓ Downstream published final release verified for $VERSION"

      - name: Summary
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          echo "✓ All promote validation checks passed for $VERSION"

  promote:
    name: Promote GHCR latest and publish release
    needs: [validate]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Create and verify latest manifest
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          ARCHS: ${{ needs.validate.outputs.architectures }}
        run: |
          set -euo pipefail
          REPO="ghcr.io/vig-os/devkit"
          IFS=' ' read -ra ARCH_ARRAY <<< "$ARCHS"
          ARCH_IMAGES=()
          for arch in "${ARCH_ARRAY[@]}"; do
            ARCH_IMAGES+=("$REPO:$VERSION-$arch")
          done
          echo "Creating/updating latest manifest: $REPO:latest"
          retry --retries 3 --backoff 3 --max-backoff 3 -- \
            docker buildx imagetools create \
              --tag "$REPO:latest" \
              "${ARCH_IMAGES[@]}"
          echo "✓ Created/updated latest manifest"
          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            if docker buildx imagetools inspect "$REPO:latest" >/dev/null 2>&1; then
              echo "✓ Latest manifest verified"
              break
            fi
            if [ "$i" -lt "$RETRIES" ]; then
              sleep 5
            else
              echo "ERROR: Latest manifest verification failed"
              exit 1
            fi
          done

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh release edit "$VERSION" --draft=false
          echo "✓ GitHub Release $VERSION published (no longer draft)"

      - name: Summary
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          echo "✓ Promoted $VERSION: GHCR :latest updated, GitHub Release published"

  merge:
    name: Merge release PR to main
    needs: [validate, promote]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Find and verify release PR
        id: pr
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          RELEASE_BRANCH="release/$VERSION"

          PR_JSON=$(retry --retries 3 --backoff 5 --max-backoff 30 -- gh pr list \
            --head "$RELEASE_BRANCH" \
            --base main \
            --json number,isDraft,reviewDecision,statusCheckRollup \
            --limit 1)

          PR_COUNT=$(echo "$PR_JSON" | jq 'length')

          if [ "$PR_COUNT" != "1" ]; then
            if [ "$PR_COUNT" = "0" ]; then
              echo "ERROR: No PR found from $RELEASE_BRANCH to main"
              exit 1
            else
              echo "ERROR: Multiple PRs found from $RELEASE_BRANCH to main"
              exit 1
            fi
          fi

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number')
          IS_DRAFT=$(echo "$PR_JSON" | jq -r '.[0].isDraft')
          REVIEW_DECISION=$(echo "$PR_JSON" | jq -r '.[0].reviewDecision')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          if [ "$IS_DRAFT" = "true" ]; then
            echo "ERROR: PR #$PR_NUMBER is still in draft status"
            exit 1
          fi

          if [ "$REVIEW_DECISION" = "APPROVED" ]; then
            echo "PR #$PR_NUMBER is approved"
          elif [ "$REVIEW_DECISION" = "null" ] || [ -z "$REVIEW_DECISION" ]; then
            APPROVED_COUNT=$(retry --retries 3 --backoff 5 --max-backoff 30 -- gh api \
              --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" \
              | jq 'add | map(select(.state == "APPROVED")) | length')
            if [ "$APPROVED_COUNT" -eq 0 ]; then
              echo "ERROR: PR #$PR_NUMBER does not have approvals"
              exit 1
            fi
            echo "PR #$PR_NUMBER has $APPROVED_COUNT approved review(s)"
          else
            echo "ERROR: PR #$PR_NUMBER does not have approvals (status: $REVIEW_DECISION)"
            exit 1
          fi

          STATUS_ROLLUP=$(echo "$PR_JSON" | jq -r '.[0].statusCheckRollup // []')
          CI_FAILED=$(echo "$STATUS_ROLLUP" | jq '[.[] | select(.conclusion == "FAILURE" or .conclusion == "ERROR")] | length')
          if [ "$CI_FAILED" != "0" ]; then
            echo "ERROR: PR #$PR_NUMBER has failed CI checks"
            exit 1
          fi

          CI_PENDING=$(echo "$STATUS_ROLLUP" | jq '[.[] | select(.conclusion == null or .conclusion == "" or .conclusion == "PENDING" or .conclusion == "IN_PROGRESS" or .conclusion == "QUEUED")] | length')
          if [ "$CI_PENDING" != "0" ]; then
            echo "ERROR: PR #$PR_NUMBER has checks still in progress"
            exit 1
          fi

          CI_SUCCESS=$(echo "$STATUS_ROLLUP" | jq '[.[] | select(.conclusion == "SUCCESS")] | length')
          if [ "$CI_SUCCESS" = "0" ]; then
            echo "ERROR: PR #$PR_NUMBER has no successful CI checks"
            exit 1
          fi

          echo "✓ PR #$PR_NUMBER verified for merge"

      - name: Merge release PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh pr merge "$PR_NUMBER" --merge
          echo "✓ Merged PR #$PR_NUMBER to main"

      - name: Summary
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          echo "✓ Release $VERSION promoted; PR #$PR_NUMBER merged to main (sync-main-to-dev may run next)"

  cleanup:
    name: Cleanup RC artifacts
    needs: [validate, promote, merge]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: ${{ needs.merge.result == 'success' }}
    continue-on-error: true
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Prune GHCR RC and matching RC signature package versions
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          PKG_PATH="/orgs/vig-os/packages/container/devcontainer/versions"
          SELECT_SCRIPT="${GITHUB_WORKSPACE}/.github/scripts/select-ghcr-prune-targets.sh"

          is_rc_for_base() {
            local tag="$1" base="$2"
            local prefix="${base}-rc" rc_suffix
            [[ "$tag" == "$prefix"* ]] || return 1
            rc_suffix="${tag#"$prefix"}"
            [[ "$rc_suffix" =~ ^[0-9]+$ ]] && return 0
            [[ "$rc_suffix" =~ ^[0-9]+-(amd64|arm64)$ ]] && return 0
            return 1
          }

          delete_ghcr_version() {
            local vid="$1"
            echo "Deleting GHCR package version id=$vid"
            if retry --retries 3 --backoff 5 --max-backoff 30 -- \
              gh api -X DELETE "$PKG_PATH/$vid"; then
              return 0
            fi
            if ! gh api "$PKG_PATH/$vid" >/dev/null 2>&1; then
              echo "Version id=$vid already absent (idempotent success after 404)"
              return 0
            fi
            echo "ERROR: delete failed for id=$vid — version still present (likely missing package admin permission)"
            return 1
          }

          TMP=$(mktemp)
          trap 'rm -f "$TMP"' EXIT

          retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh api --paginate "$PKG_PATH" > "$TMP"

          mapfile -t DEL_IDS < <(
            jq -s 'add // []' "$TMP" | bash "$SELECT_SCRIPT" "$VERSION" | sort -u
          )

          if [ "${#DEL_IDS[@]}" -eq 0 ]; then
            echo "No GHCR RC prune targets for base version $VERSION"
          fi

          FAILURES=()
          for vid in "${DEL_IDS[@]}"; do
            [ -z "$vid" ] && continue
            if ! delete_ghcr_version "$vid"; then
              FAILURES+=("$vid")
            fi
          done

          LEFT_TAGS=()
          retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh api --paginate "$PKG_PATH" > "$TMP"
          while IFS= read -r row; do
            [ -z "$row" ] && continue
            mapfile -t tags < <(printf '%s' "$row" | jq -r '(.metadata.container.tags // [])[]?')
            for t in "${tags[@]}"; do
              if is_rc_for_base "$t" "$VERSION"; then
                LEFT_TAGS+=("$t")
              fi
            done
          done < <(jq -s 'add // []' "$TMP" | jq -c '.[]')

          mapfile -t UNIQUE_LEFT < <(printf '%s\n' "${LEFT_TAGS[@]}" | sort -u | sed '/^$/d')

          if [ ${#FAILURES[@]} -gt 0 ] || [ ${#UNIQUE_LEFT[@]} -gt 0 ]; then
            if [ ${#FAILURES[@]} -gt 0 ]; then
              echo "ERROR: GHCR delete failures (${#FAILURES[@]}): ${FAILURES[*]}"
            fi
            if [ ${#UNIQUE_LEFT[@]} -gt 0 ]; then
              echo "ERROR: RC tags still present for $VERSION: ${UNIQUE_LEFT[*]}"
            fi
            echo "See https://github.com/vig-os/devcontainer/issues/583"
            exit 1
          fi

          echo "✓ GHCR prune pass complete for base version $VERSION (no RC tags remain)"

      - name: Delete RC draft pre-releases and git RC tags
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          SELECT_SCRIPT="${GITHUB_WORKSPACE}/.github/scripts/select-rc-draft-releases.sh"
          TMP=$(mktemp)
          trap 'rm -f "$TMP"' EXIT

          # Pass 1: delete RC draft pre-releases by release id. Seeding from the
          # releases list (not git tags) reclaims drafts whose RC tag was already
          # removed by an earlier partial run; deleting by id works for drafts,
          # which `gh release delete <tag>` cannot resolve.
          retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" > "$TMP"
          DELETE_FAILED=0
          while IFS=$'\t' read -r rel_id tag; do
            [ -z "$rel_id" ] && continue
            echo "Deleting RC draft pre-release $tag (release id $rel_id)"
            if ! retry --retries 3 --backoff 5 --max-backoff 30 -- \
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${rel_id}"; then
              echo "ERROR: failed to delete RC draft pre-release $tag (release id $rel_id)"
              DELETE_FAILED=1
            fi
          done < <(jq -s 'add // []' "$TMP" | bash "$SELECT_SCRIPT" "$VERSION")

          # Re-read releases after deletions so the tag pass and verification see
          # the current state.
          retry --retries 3 --backoff 5 --max-backoff 30 -- \
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" > "$TMP"
          RELEASES_AFTER=$(jq -s 'add // []' "$TMP")

          # Pass 2: delete leftover git RC tags for the base version, but keep any
          # tag that still has a GitHub Release attached — a published pre-release,
          # or a draft whose deletion failed above so it stays discoverable.
          TAGS=$(retry --retries 3 --backoff 5 --max-backoff 30 -- \
            git ls-remote --tags --refs "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${VERSION}-rc*" \
            | awk '{print $2}' | sed 's#refs/tags/##' || true)
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            HAS_RELEASE=$(printf '%s' "$RELEASES_AFTER" | jq -r --arg t "$tag" 'any(.[]; .tag_name == $t)')
            if [ "$HAS_RELEASE" = "true" ]; then
              echo "Keeping tag $tag (GitHub Release still attached)"
              continue
            fi
            echo "Deleting remote tag $tag (no GitHub Release)"
            retry --retries 3 --backoff 5 --max-backoff 30 -- \
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${tag}" \
              || echo "WARN: failed to delete tag $tag"
          done <<< "$TAGS"

          # Verify: no RC draft pre-release for the base version may survive.
          REMAINING=$(printf '%s' "$RELEASES_AFTER" | bash "$SELECT_SCRIPT" "$VERSION" || true)
          if [ -n "$REMAINING" ]; then
            echo "ERROR: RC draft pre-releases still present for $VERSION:"
            printf '%s\n' "$REMAINING"
            exit 1
          fi
          if [ "$DELETE_FAILED" -ne 0 ]; then
            echo "ERROR: one or more RC draft pre-release deletions failed for $VERSION"
            exit 1
          fi
          echo "✓ RC draft pre-release and git RC tag cleanup complete for $VERSION"
