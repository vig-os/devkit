# Prepare Release Branch for Testing and Validation
#
# Workflow that freezes the CHANGELOG on dev and creates a release branch:
# 1. Validate: Check inputs and prerequisites
# 2. Prepare:
#    a. Freeze CHANGELOG on dev (Unreleased → [X.Y.Z] - TBD + fresh empty Unreleased)
#    b. Fork release branch from the freeze commit (keeps the empty Unreleased)
#    c. Create draft PR to main
#
# CHANGELOG flow:
#   dev:     ## Unreleased (empty) + ## [X.Y.Z] - TBD (with content)
#   release: ## Unreleased (empty) + ## [X.Y.Z] - TBD (with content)
#
# The empty ## Unreleased is never stripped, so it is present on both dev and
# release/main and is stable common context in the freeze commit that becomes
# the main↔dev merge base. Finalization only edits the [X.Y.Z] line; the sync
# merge keeps ## Unreleased instead of silently dropping it (#590).

name: Prepare Release

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to prepare (e.g., 1.2.3)'
        required: true
        type: string
      dry-run:
        description: 'Validate without making changes'
        required: false
        default: false
        type: boolean
      git-user-name:
        description: 'Git user name for commits'
        required: false
        default: 'vigOS Release Bot'
        type: string
      git-user-email:
        description: 'Git user email for commits'
        required: false
        default: 'release@vig-os.local'
        type: string

permissions:
  contents: read          # safe default; prepare job escalates as needed

jobs:
  validate:
    name: Validate Release Preparation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.vars.outputs.version }}
      release_branch: ${{ steps.vars.outputs.release_branch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: dev
          fetch-depth: 0

      - name: Validate and prepare variables
        id: vars
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          VERSION="$INPUT_VERSION"

          # Validate semantic version format
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version format '$VERSION'"
            echo "Version must follow semantic versioning format: MAJOR.MINOR.PATCH (e.g., 1.2.3)"
            exit 1
          fi

          RELEASE_BRANCH="release/$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_branch=$RELEASE_BRANCH" >> $GITHUB_OUTPUT
          echo "✓ Version format validated: $VERSION"

      - name: Verify release branch does not exist
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          RELEASE_BRANCH="release/$VERSION"

          if git show-ref --verify --quiet "refs/heads/$RELEASE_BRANCH"; then
            echo "ERROR: Release branch already exists locally: $RELEASE_BRANCH"
            exit 1
          fi

          if git show-ref --verify --quiet "refs/remotes/origin/$RELEASE_BRANCH"; then
            echo "ERROR: Release branch already exists on remote: $RELEASE_BRANCH"
            exit 1
          fi

          echo "✓ Release branch does not exist: $RELEASE_BRANCH"

      - name: Verify tag does not exist
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail

          if git tag -l | grep -q "^$VERSION$"; then
            echo "ERROR: Tag $VERSION already exists"
            exit 1
          fi

          echo "✓ Tag does not exist: $VERSION"

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'

      - name: Verify CHANGELOG has Unreleased section with content
        run: |
          set -euo pipefail
          uv run prepare-changelog validate CHANGELOG.md

      - name: Verify dev branch is checked out
        run: |
          set -euo pipefail
          CURRENT_BRANCH=$(git branch --show-current)
          if [ "$CURRENT_BRANCH" != "dev" ]; then
            echo "ERROR: Expected to be on dev branch, but on: $CURRENT_BRANCH"
            exit 1
          fi
          echo "✓ Checked out dev branch"

      - name: Summary
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          RELEASE_BRANCH: ${{ steps.vars.outputs.release_branch }}
          DRY_RUN: ${{ github.event.inputs.dry-run }}
        run: |
          echo "✓ All validation checks passed"
          echo ""
          echo "Release Preparation Configuration:"
          echo "  Version: $VERSION"
          echo "  Release Branch: $RELEASE_BRANCH"
          echo "  Dry-run: $DRY_RUN"

  prepare:
    name: Prepare Release Branch
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: ${{ github.event.inputs.dry-run != 'true' }}
    permissions:
      contents: read          # checkout dev branch

    steps:
      - name: Generate Commit App Token
        id: commit-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          client-id: ${{ secrets.COMMIT_APP_CLIENT_ID }}
          private-key: ${{ secrets.COMMIT_APP_PRIVATE_KEY }}

      - name: Generate Release App Token
        id: release-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout dev branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: dev
          fetch-depth: 0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'

      - name: Capture pre-prepare dev SHA
        id: pre-state
        env:
          GH_TOKEN: ${{ steps.commit-app-token.outputs.token }}
        run: |
          set -euo pipefail
          PREPARE_START_SHA=$(uv run retry --retries 3 --backoff 5 --max-backoff 60 -- \
            gh api "repos/${{ github.repository }}/git/ref/heads/dev" --jq '.object.sha')
          echo "prepare_start_sha=$PREPARE_START_SHA" >> "$GITHUB_OUTPUT"
          echo "✓ Captured pre-prepare dev SHA: $PREPARE_START_SHA"

      - name: Prepare CHANGELOG (freeze + reset)
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          echo "Preparing CHANGELOG for version $VERSION..."
          uv run prepare-changelog prepare "$VERSION" CHANGELOG.md
          echo "✓ CHANGELOG prepared (Unreleased → [${VERSION}] - TBD + fresh Unreleased)"

      - name: Sync workspace manifest after changelog prepare
        run: |
          set -euo pipefail
          uv run python scripts/sync_manifest.py sync assets/workspace/
          echo "✓ Synced workspace manifest after changelog prepare"

      - name: Extract CHANGELOG content for PR body
        id: changelog
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          # Anchor the range patterns to start-of-line so only real column-0
          # version headings delimit the section. An unanchored "## [" also
          # matches inline backtick-quoted headings inside bullets (e.g.
          # `## [X.Y.Z] - TBD`), which truncated the PR body early (#620).
          CHANGELOG_CONTENT=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          {
            echo "changelog<<CHANGELOGEOF"
            echo "$CHANGELOG_CONTENT"
            echo "CHANGELOGEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit prepared CHANGELOG to dev via API
        uses: vig-os/commit-action@1bc004353d08d9332a0cb54920b148256220c8e0  # v0.2.0
        env:
          GH_TOKEN: ${{ steps.commit-app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_BRANCH: refs/heads/dev
          MAX_ATTEMPTS: "3"
          COMMIT_MESSAGE: |-
            chore: freeze changelog for release ${{ needs.validate.outputs.version }}

            Move Unreleased content to [${{ needs.validate.outputs.version }}] - TBD
            and create fresh empty Unreleased section for continued development.
          FILE_PATHS: CHANGELOG.md,assets/workspace/.devcontainer/CHANGELOG.md

      - name: Create release branch from dev
        id: create-branch
        env:
          GH_TOKEN: ${{ steps.commit-app-token.outputs.token }}
          RELEASE_BRANCH: ${{ needs.validate.outputs.release_branch }}
          PREPARE_START_SHA: ${{ steps.pre-state.outputs.prepare_start_sha }}
        run: |
          set -euo pipefail
          # Wait for dev to advance past the pre-freeze SHA before branching (#617).
          # The freeze commit-action updates dev's ref, but a REST ref read can
          # briefly return the stale pre-freeze SHA (read-after-write lag); branching
          # then would create release/X.Y.Z without the freeze. `retry` only retries
          # on failure, so a stale-but-successful read slips through -- assert the SHA
          # actually changed instead of trusting the first read.
          DEV_SHA=""
          for attempt in $(seq 1 8); do
            DEV_SHA=$(uv run retry --retries 3 --backoff 5 --max-backoff 60 -- \
              gh api "repos/${{ github.repository }}/git/ref/heads/dev" --jq '.object.sha')
            if [ "$DEV_SHA" != "$PREPARE_START_SHA" ]; then
              break
            fi
            echo "dev still at pre-freeze SHA $DEV_SHA (attempt $attempt/8); waiting for freeze to propagate..."
            sleep 5
          done
          if [ "$DEV_SHA" = "$PREPARE_START_SHA" ]; then
            echo "ERROR: dev did not advance past pre-freeze SHA $PREPARE_START_SHA; freeze commit not visible"
            exit 1
          fi
          echo "Creating branch $RELEASE_BRANCH from dev at $DEV_SHA..."
          uv run retry --retries 3 --backoff 5 --max-backoff 60 -- \
            gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/heads/$RELEASE_BRANCH" \
            -f sha="$DEV_SHA"
          echo "dev_sha=$DEV_SHA" >> "$GITHUB_OUTPUT"
          echo "✓ Release branch created on remote"

      - name: Verify release branch is resolvable
        env:
          GH_TOKEN: ${{ steps.commit-app-token.outputs.token }}
          RELEASE_BRANCH: ${{ needs.validate.outputs.release_branch }}
        run: |
          set -euo pipefail
          uv run retry --retries 10 --backoff 2 --max-backoff 30 -- \
            gh api "repos/${{ github.repository }}/git/ref/heads/$RELEASE_BRANCH" --jq '.object.sha'
          echo "✓ Release branch ref verified as resolvable"

      # The release branch keeps the empty ## Unreleased section (no stripping).
      # main therefore retains ## Unreleased above the dated release, matching
      # dev, so the section is stable common context in the eventual main↔dev
      # sync merge and can never be silently dropped (#590). Keep a Changelog
      # endorses an always-present Unreleased section.

      - name: Create draft PR to main
        id: pr
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_BRANCH: ${{ needs.validate.outputs.release_branch }}
          CHANGELOG_CONTENT: ${{ steps.changelog.outputs.changelog }}
        run: |
          set -euo pipefail

          PR_BODY="# Release $VERSION

          This PR prepares release $VERSION for merge to main.

          $CHANGELOG_CONTENT
          "

          PR_URL=$(uv run retry --retries 3 --backoff 5 --max-backoff 60 -- \
            gh pr create \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "chore: release $VERSION" \
            --body "$PR_BODY" \
            --draft)

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "✓ Draft PR created: $PR_URL (#$PR_NUMBER)"

      - name: Roll back prepare-release side effects on failure
        if: ${{ failure() }}
        id: rollback-prepare
        env:
          GH_TOKEN: ${{ steps.commit-app-token.outputs.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_BRANCH: ${{ needs.validate.outputs.release_branch }}
          PREPARE_START_SHA: ${{ steps.pre-state.outputs.prepare_start_sha }}
          POST_FREEZE_DEV_SHA: ${{ steps.create-branch.outputs.dev_sha }}
        run: |
          set -euo pipefail

          BRANCH_DELETED=false
          CHANGELOG_ROLLBACK_NEEDED=false

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "w Skipping rollback: GH_TOKEN is not set; cannot safely call GitHub API"
            exit 0
          fi
          if [ -z "${PREPARE_START_SHA:-}" ]; then
            echo "w Skipping rollback: PREPARE_START_SHA is not set; cannot restore pre-prepare CHANGELOG"
            exit 0
          fi

          if uv run retry --retries 3 --backoff 5 --max-backoff 60 -- \
            gh api "repos/${{ github.repository }}/git/ref/heads/$RELEASE_BRANCH" >/dev/null 2>&1; then
            uv run retry --retries 3 --backoff 5 --max-backoff 60 -- \
              gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$RELEASE_BRANCH"
            BRANCH_DELETED=true
            echo "✓ Deleted partially created release branch: $RELEASE_BRANCH"
          else
            echo "i Release branch not present; nothing to delete"
          fi

          CURRENT_DEV_SHA="$(uv run retry --retries 3 --backoff 5 --max-backoff 60 -- \
            gh api "repos/${{ github.repository }}/git/ref/heads/dev" --jq '.object.sha')"
          if [ -n "${POST_FREEZE_DEV_SHA:-}" ] && [ "$CURRENT_DEV_SHA" != "$POST_FREEZE_DEV_SHA" ]; then
            echo "w dev advanced after freeze commit; skipping CHANGELOG rollback to avoid clobbering concurrent updates"
            echo "branch_deleted=$BRANCH_DELETED" >> "$GITHUB_OUTPUT"
            echo "changelog_rollback_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          uv run retry --retries 3 --backoff 5 --max-backoff 60 -- \
            gh api "repos/${{ github.repository }}/contents/CHANGELOG.md?ref=$PREPARE_START_SHA" --jq '.content' | tr -d '\n' | base64 -d > /tmp/changelog.pre-prepare.md
          uv run retry --retries 3 --backoff 5 --max-backoff 60 -- \
            gh api "repos/${{ github.repository }}/contents/CHANGELOG.md?ref=$CURRENT_DEV_SHA" --jq '.content' | tr -d '\n' | base64 -d > /tmp/changelog.current-dev.md

          if cmp -s /tmp/changelog.pre-prepare.md /tmp/changelog.current-dev.md; then
            echo "i dev CHANGELOG already matches pre-prepare state"
          else
            cp /tmp/changelog.pre-prepare.md CHANGELOG.md
            uv run python scripts/sync_manifest.py sync assets/workspace/
            CHANGELOG_ROLLBACK_NEEDED=true
            echo "✓ Prepared CHANGELOG rollback content for dev"
          fi

          echo "branch_deleted=$BRANCH_DELETED" >> "$GITHUB_OUTPUT"
          echo "changelog_rollback_needed=$CHANGELOG_ROLLBACK_NEEDED" >> "$GITHUB_OUTPUT"

      - name: Commit CHANGELOG rollback to dev via API
        if: ${{ failure() && steps.rollback-prepare.outputs.changelog_rollback_needed == 'true' }}
        uses: vig-os/commit-action@1bc004353d08d9332a0cb54920b148256220c8e0  # v0.2.0
        env:
          GH_TOKEN: ${{ steps.commit-app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_BRANCH: refs/heads/dev
          MAX_ATTEMPTS: "3"
          COMMIT_MESSAGE: |-
            chore: rollback failed prepare-release ${{ needs.validate.outputs.version }}

            Restore CHANGELOG.md on dev to pre-prepare state after prepare-release failed.
          FILE_PATHS: CHANGELOG.md,assets/workspace/.devcontainer/CHANGELOG.md

      - name: Rollback summary
        if: ${{ failure() }}
        env:
          RELEASE_BRANCH: ${{ needs.validate.outputs.release_branch }}
          BRANCH_DELETED: ${{ steps.rollback-prepare.outputs.branch_deleted }}
          CHANGELOG_ROLLBACK_NEEDED: ${{ steps.rollback-prepare.outputs.changelog_rollback_needed }}
        run: |
          echo "x Prepare release failed; rollback routine completed"
          echo "  Release branch: $RELEASE_BRANCH"
          echo "  Branch deleted: ${BRANCH_DELETED:-false}"
          echo "  CHANGELOG rollback attempted: ${CHANGELOG_ROLLBACK_NEEDED:-false}"

      - name: Summary
        if: ${{ success() }}
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_BRANCH: ${{ needs.validate.outputs.release_branch }}
        run: |
          echo "✓ Release branch prepared successfully!"
          echo ""
          echo "Release Summary:"
          echo "  Version: $VERSION"
          echo "  Branch: $RELEASE_BRANCH"
          echo ""
          echo "CHANGELOG state:"
          echo "  dev:     ## Unreleased (empty) + ## [$VERSION] - TBD"
          echo "  release: ## Unreleased (empty) + ## [$VERSION] - TBD"
          echo ""
          echo "Next steps:"
          echo "  1. Test release: git checkout $RELEASE_BRANCH"
          echo "  2. Review draft PR and monitor CI"
          echo "  3. Fix any issues via bugfix PRs to $RELEASE_BRANCH"
          echo "  4. Mark PR as ready for review (gh pr ready <PR_NUMBER>)"
          echo "  5. Get PR approval from reviewer"
          echo "  6. Publish candidate: just publish-candidate $VERSION"
          echo "  7. Final release: just finalize-release $VERSION"
