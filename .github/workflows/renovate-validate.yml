# Fail PRs that introduce invalid Renovate JSON before merge (Refs: #520).

name: Validate Renovate config

on:  # yamllint disable-line rule:truthy
  pull_request:
    paths:
      - '**/renovate*.json'
      - '.github/renovate*.json'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'

      # Exclude assets/workspace/renovate.json: extends uses {{GITHUB_REPOSITORY}};
      # renovate-config-validator --strict rejects the preset until init replaces it.
      - name: Discover Renovate configs
        id: configs
        run: |
          mapfile -t files < <(git ls-files 'renovate*.json' '**/renovate*.json' | grep -vx 'assets/workspace/renovate.json' || true)
          printf '%s\n' "${files[@]}"
          printf 'files=%s\n' "${files[*]}" >> "$GITHUB_OUTPUT"

      - name: Validate Renovate configs
        run: npx --yes --package renovate@latest -c "renovate-config-validator --strict ${{ steps.configs.outputs.files }}"
