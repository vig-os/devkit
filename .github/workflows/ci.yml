# CI Workflow
#
# This workflow runs automated tests and linters to validate code quality.
# Runs on pull requests to dev, release/**, and main branches as a pre-merge gate.
#
# Jobs:
#   1. build-image - Build container image
#   2. test-image - Run image tests
#   3. test-integration - Run integration tests
#   4. project-checks - Linters, utils, release cycle tests
#   5. security-scan - Container image vulnerability scanning (Trivy)
#   6. dependency-review - Dependency vulnerability check (PRs only)
#
# Triggers:
#   - Pull requests to dev, release/**, and main (runs all suites)
#   - Manual workflow_dispatch (select specific test suite to run)

name: CI

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - dev
      - 'release/**'
      - main
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - image
          - integration
          - project

permissions:
  contents: read

jobs:
  build-image:
    name: Build Container Image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Build image once and share via tar artifact to avoid rebuilding in each test job
    # Trade-off: tar transfer is slower but ensures all tests use identical image
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'image' ||
      inputs.test-suite == 'integration'

    outputs:
      version: ${{ steps.version.outputs.version }}
      release_date: ${{ steps.version.outputs.release_date }}
      release_url: ${{ steps.version.outputs.release_url }}
      build_timestamp: ${{ steps.version.outputs.build_timestamp }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Generate version for dev build
        id: version
        run: |
          VERSION="dev-$(git rev-parse --short HEAD)"
          VCS_REF=$(git rev-parse HEAD)
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${VCS_REF}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "vcs_ref=$VCS_REF" >> $GITHUB_OUTPUT
          echo "release_date=$RELEASE_DATE" >> $GITHUB_OUTPUT
          echo "build_timestamp=$BUILD_TIMESTAMP" >> $GITHUB_OUTPUT
          echo "release_url=$RELEASE_URL" >> $GITHUB_OUTPUT
          echo "Building dev version: $VERSION"

      - name: Build container image
        uses: ./.github/actions/build-image
        with:
          version: ${{ steps.version.outputs.version }}
          arch: amd64
          release-date: ${{ steps.version.outputs.release_date }}
          release-url: ${{ steps.version.outputs.release_url }}
          build-timestamp: ${{ steps.version.outputs.build_timestamp }}
          vcs-ref: ${{ steps.version.outputs.vcs_ref }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          output-file: /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: container-image-${{ steps.version.outputs.version }}-amd64
          path: /tmp/image.tar
          retention-days: 1
          compression-level: 0   # Image is already compressed; avoid double-compression overhead

  test-image:
    name: Image Tests
    needs: build-image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'image'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: container-image-${{ needs.build-image.outputs.version }}-amd64
          path: /tmp

      - name: Test container image
        uses: ./.github/actions/test-image
        with:
          image-tag: ${{ needs.build-image.outputs.version }}-amd64
          image-source: tar
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  test-integration:
    name: Integration Tests
    needs: build-image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'integration'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: container-image-${{ needs.build-image.outputs.version }}-amd64
          path: /tmp

      - name: Run integration tests
        uses: ./.github/actions/test-integration
        with:
          image-tag: ${{ needs.build-image.outputs.version }}-amd64
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: integration-test-artifacts
          path: |
            pytest-*.log
            /tmp/workspace-*
          retention-days: 7
          if-no-files-found: ignore

  project-checks:
    name: Project Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'project'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run project checks
        uses: ./.github/actions/test-project
        with:
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Tier 0 (#779): evaluate + build every `checks.<system>` derivation in
      # parallel with an eval cache via nix-fast-build — the pure formatting
      # (treefmt), deadnix/statix, dev-shell build, devShellTools eval, and the
      # git-hooks.nix `pre-commit` gate. Faster than serial `nix flake check`;
      # nix-fast-build evaluates through nix-eval-jobs, so eval/type errors still
      # surface. The runner is amd64, so target x86_64-linux explicitly. The
      # effectful checks (image testinfra, integration, vulnix CVE-DB, the impure
      # pre-commit hooks) stay GH-orchestrated in their own jobs. Refs #674, #779.
      - name: Check flake quality gates (Tier 0 — nix-fast-build)
        run: nix run .#nix-fast-build -- --skip-cached --no-nom --flake ".#checks.x86_64-linux"

      # Validate the flake OUTPUT SCHEMA that nix-fast-build (which only builds
      # `checks`) does not exercise: the treefmt formatter, the checks attrset
      # names, the `install` app, and the nixos/homeManager modules. Cheap evals;
      # the slow `nix flake check` build is covered by nix-fast-build above. #779.
      - name: Validate flake output schema
        run: uv run pytest tests/test_flake_checks.py -k "not flake_check_succeeds" -v

      # Guard the dev-shell <-> image parity: the dev-shell must expose
      # `python3` (#729), carry the `prek` hook runner in the devTools SSoT
      # (#778), and must NOT leak the Nix C++ runtime onto an FHS host's
      # LD_LIBRARY_PATH (#703). These drive `nix develop` directly (not covered
      # by `test-project`'s pytest scope), so run them explicitly here where Nix
      # + the dev profile are warm. Refs #729, #703, #778.
      - name: Check dev-shell python/prek parity + FHS leak-guard
        run: |
          uv run pytest tests/test_flake_devshell.py \
            -k "exposes_python3_and_precommit or hook_runner_is_prek or no_nix_cxx_runtime_leak" -v

      # Run the capability-module contract tests (#884): the `native` module
      # shell exposes the C/C++ toolchain on its own PATH and exports generic
      # CC/CXX, plus the C-extension sdist smoke. nix-fast-build above already
      # builds `checks.*.module-native`, so `nix develop` is warm; the sdist
      # smoke needs PyPI, which this lane already uses (setup-env runs
      # `uv sync`), so it is included rather than deselected. Refs #884.
      - name: Check capability-module contracts (native)
        run: uv run pytest tests/test_flake_modules.py -v

      # Validate the scaffolded downstream stub (assets/workspace/flake.nix)
      # against THIS toolchain, not the published vigos, so a change to the flake
      # API (lib.mkProjectShell / overlays.default) can't silently break a
      # downstream repo's `direnv allow`. Refs #640.
      - name: Check downstream flake stub
        run: nix flake check ./assets/workspace --override-input vigos "path:$PWD" --accept-flake-config

  python-security:
    name: Python Security Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'project'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Install safety
        run: |
          set -euo pipefail
          uv run retry --retries 3 --backoff 5 --max-backoff 30 -- uv pip install safety==3.7.0

      - name: Run Bandit (Python security linting)
        id: bandit
        run: |
          uv run bandit -r scripts/ assets/workspace/ -ll -f json -o bandit-report.json || true
          echo "Bandit scan completed"

      - name: Run Safety (dependency vulnerability check)
        id: safety
        run: |
          uv run safety check --json > safety-report.json || true
          echo "Safety scan completed"

      - name: Upload security reports as artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Report Bandit findings
        if: always() && steps.bandit.outcome == 'success'
        run: |
          if [ -f bandit-report.json ]; then
            echo "## Python Security: Bandit" >> $GITHUB_STEP_SUMMARY
            python -m json.tool bandit-report.json | head -50 >> $GITHUB_STEP_SUMMARY || true
          fi

  security-scan:
    name: Security Scan
    needs: build-image
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'image'
    permissions:
      contents: read

    # The Nix image has no apt/dpkg DB, so Trivy's OS-package scanner is largely
    # dark here; the authoritative CVE gate is the nightly vulnix scan
    # (security-scan.yml, scan-nix-image — blocking via vulnix-gate). PR CI runs
    # Trivy non-blocking for awareness + a CycloneDX SBOM artifact, and validates
    # the exception registers' expiry. Refs #642, #637.
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate .trivyignore/.vulnixignore exception expirations
        run: uv run check-expirations .trivyignore .vulnixignore

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: container-image-${{ needs.build-image.outputs.version }}-amd64
          path: /tmp

      - name: Report HIGH/CRITICAL vulnerabilities (non-blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          version: 'v0.71.2'
          input: /tmp/image.tar
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          trivyignores: '.trivyignore'

      - name: Report MEDIUM severity vulnerabilities (non-blocking)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          version: 'v0.71.2'
          input: /tmp/image.tar
          format: 'table'
          severity: 'MEDIUM'
          exit-code: '0'  # Non-blocking report

      - name: Generate container SBOM (CycloneDX)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          version: 'v0.71.2'
          input: /tmp/image.tar
          format: 'cyclonedx'
          output: 'sbom-cyclonedx.json'

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-${{ needs.build-image.outputs.version }}-amd64
          path: sbom-cyclonedx.json
          retention-days: 30

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up environment
        uses: ./.github/actions/setup-env
        with:
          sync-dependencies: 'true'
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate dependency-review exceptions
        id: exceptions
        run: |
          set -euo pipefail
          FILE=".github/dependency-review-allow.txt"
          if [[ ! -f "$FILE" ]]; then
            echo "No exceptions file found — skipping"
            echo "allow-ghsas=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          uv run check-expirations "$FILE"

          GHSA_LIST=""
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
            [[ "$line" =~ ^Expiration: ]] && continue
            if [[ "$line" =~ ^GHSA- ]]; then
              ghsa="${line%%[[:space:]]*}"
              [[ -n "$GHSA_LIST" ]] && GHSA_LIST+=", "
              GHSA_LIST+="$ghsa"
            fi
          done < "$FILE"

          echo "allow-ghsas=${GHSA_LIST}" >> "$GITHUB_OUTPUT"
          echo "Validated dependency-review exceptions: ${GHSA_LIST:-none}"

      - name: Review dependencies for vulnerabilities
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: high
          allow-ghsas: ${{ steps.exceptions.outputs.allow-ghsas }}

  summary:
    name: Test Summary
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs:
      - build-image
      - test-image
      - test-integration
      - project-checks
      - python-security
      - security-scan
      - dependency-review
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Test Results Summary"
          echo "======================="
          echo ""
          echo "Build Image: ${{ needs.build-image.result }}"
          echo "Image Tests: ${{ needs.test-image.result }}"
          echo "Integration Tests: ${{ needs.test-integration.result }}"
          echo "Project Checks: ${{ needs.project-checks.result }}"
          echo "Python Security: ${{ needs.python-security.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Dependency Review: ${{ needs.dependency-review.result }}"
          echo ""

          # Check if any job that ran has failed (skip 'skipped' jobs)
          FAILED=false

          if [ "${{ needs.build-image.result }}" = "failure" ]; then
            echo "ERROR: Build image failed"
            FAILED=true
          fi

          if [ "${{ needs.test-image.result }}" = "failure" ]; then
            echo "ERROR: Image tests failed"
            FAILED=true
          fi

          if [ "${{ needs.test-integration.result }}" = "failure" ]; then
            echo "ERROR: Integration tests failed"
            FAILED=true
          fi

          if [ "${{ needs.project-checks.result }}" = "failure" ]; then
            echo "ERROR: Project checks failed"
            FAILED=true
          fi

          if [ "${{ needs.python-security.result }}" = "failure" ]; then
            echo "ERROR: Python security scan failed"
            FAILED=true
          fi

          if [ "${{ needs.security-scan.result }}" = "failure" ]; then
            echo "ERROR: Security scan failed"
            FAILED=true
          fi

          if [ "${{ needs.dependency-review.result }}" = "failure" ]; then
            echo "ERROR: Dependency review failed"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "One or more test suites failed"
            exit 1
          fi

          echo ""
          echo "All executed test suites passed"
