# CI Workflow (bare mode, host-native)
#
# The `bare` delivery mode ships the vig-os standards without any container
# or flake machinery, so this CI variant runs directly on the runner: no
# image-resolution step, no in-container jobs — uv is set up on the host and
# the jobs drive the same `just sync|precommit|test` contract as the
# container-based template (#885).
#
# Jobs:
#   1. lint    — Pre-commit hooks (prek)
#   2. test    — Pytest
#   3. summary — Aggregate results for branch protection
#
# Triggers:
#   - Pull requests to dev, release/**, and main
#   - Manual workflow_dispatch
#

name: CI

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - dev
      - 'release/**'
      - main
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - lint
          - test

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'lint'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1

      - name: Install just and prek
        # Pinned to the versions the vig-os toolchain ships; bump via Renovate
        # or manually alongside a devkit upgrade.
        run: |
          uv tool install rust-just==1.51.0
          uv tool install prek==0.3.11
          uv tool dir --bin >> "$GITHUB_PATH"

      - name: Sync project dependencies
        run: just sync

      - name: Run pre-commit hooks
        run: just precommit

  test:
    name: Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.test-suite == 'all' ||
      inputs.test-suite == 'test'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1

      - name: Install just
        # Pinned to the version the vig-os toolchain ships; bump via Renovate
        # or manually alongside a devkit upgrade.
        run: |
          uv tool install rust-just==1.51.0
          uv tool dir --bin >> "$GITHUB_PATH"

      - name: Sync project dependencies
        run: just sync

      - name: Run tests
        run: just test

  summary:
    name: CI Summary
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [lint, test]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "CI Results Summary"
          echo "==================="
          echo ""
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo ""

          FAILED=false

          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "ERROR: Lint checks failed"
            FAILED=true
          fi

          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "ERROR: Tests failed"
            FAILED=true
          fi

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "One or more checks failed"
            exit 1
          fi

          echo ""
          echo "All executed checks passed"
