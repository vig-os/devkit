# INERT EXAMPLE — see ./README.md.
#
# This shows the SHAPE of a secrets file only. It is deliberately PLAINTEXT and
# holds a FAKE value; it is NOT a real sops-encrypted file and decrypts to
# nothing. In real use you never hand-write ciphertext — you run `sops secrets.yaml`
# and sops encrypts each value in place, appending a `sops:` metadata block.
#
# DO NOT put a real secret here. DO NOT commit a real encrypted secrets file to
# this docs example.

# Example runtime secret a downstream service would read at start-up.
example_service:
  # In a real, sops-managed file this value would be ciphertext, e.g.
  #   api_token: ENC[AES256_GCM,data:...,iv:...,tag:...,type:str]
  api_token: "REPLACE_ME_not_a_real_secret_inert_example"
