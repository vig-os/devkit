# INERT EXAMPLE — see ./README.md. Not used by any live path.
# The recipients below are PLACEHOLDERS, not real age public keys.
#
# `keys` anchors let creation_rules reference recipients by name. Each entry is
# an age *public* key (age1...). In real use, replace with real recipients:
#   - one per admin who edits secrets
#   - one per consumer machine/user that must decrypt at runtime
keys:
  - &admin_example    age1example00admin00000000000000000000000000000000000000000000
  - &consumer_example age1example00consumer000000000000000000000000000000000000000000

creation_rules:
  # Any secrets/*.yaml|json file is encrypted to BOTH the admin and the consumer,
  # so the admin can edit and the consumer machine can decrypt at activation.
  # Note: exactly one `-` before the `age:` block; subsequent recipients have no
  # leading `-` of their own key type (sops treats multiple key types as AND).
  - path_regex: secrets/[^/]+\.(yaml|json)$
    key_groups:
      - age:
          - *admin_example
          - *consumer_example
