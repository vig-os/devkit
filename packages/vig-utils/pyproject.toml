[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vig-utils"
version = "0.1.0"
description = "Reusable CLI utilities for development workflows"
readme = "README.md"
license = "MIT"
requires-python = "==3.14.5"
dependencies = ["rich"]
authors = [
  { name = "Carlos Vigo", email = "carlos.vigo@exoma.ch" },
  { name = "Lars Gerchow", email = "lars.gerchow@exoma.ch" },
]

[project.scripts]
validate-commit-msg = "vig_utils.validate_commit_msg:main"
check-action-pins = "vig_utils.check_action_pins:main"
prepare-changelog = "vig_utils.prepare_changelog:main"
gh-issues = "vig_utils.gh_issues:main"
prepare-commit-msg-strip-trailers = "vig_utils.prepare_commit_msg_strip_trailers:main"
check-agent-identity = "vig_utils.check_agent_identity:main"
check-pr-agent-fingerprints = "vig_utils.check_pr_agent_fingerprints:main"
resolve-branch = "vig_utils.resolve_branch:main"
derive-branch-summary = "vig_utils.derive_branch_summary:main"
check-skill-names = "vig_utils.check_skill_names:main"
setup-labels = "vig_utils.setup_labels:main"
retry = "vig_utils.retry:main"
renovate-changelog-pr = "vig_utils.renovate_changelog_pr:main"
vig-utils = "vig_utils.utils:main"

[tool.hatch.build.targets.wheel]
packages = ["src/vig_utils"]
